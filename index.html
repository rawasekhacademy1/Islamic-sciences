function bindCallSheetActions(){
  // تفويض واحد على المودال بالكامل بدل إعادة ربط الأزرار كل مرة يتحدّث فيها المحتوى (منع Duplicate Event Listeners)
  const sheet = $('#modalSheet');
  if(!sheet || sheet._callSheetBound) return;
  sheet._callSheetBound = true;
  sheet.addEventListener('click', async e=>{
    const ctx = state._callSheetCtx; if(!ctx) return;
    if(e.target.id==='btnCreateCallRoom'){
      e.target.disabled = true;
      await createCallRoomFlow(ctx);
    } else if(e.target.id==='btnSendCallInvite'){
      e.target.disabled = true;
      await sendCallInvite(ctx);
    } else if(e.target.id==='btnJoinMyRoom' || e.target.id==='btnJoinInvitedCall'){
      hideModal();
      await joinCallRoom(ctx.callId);
    } else if(e.target.id==='btnCancelCallRoom'){
      e.target.disabled = true;
      await teacherEndOrCancelRoom(ctx.callId, ctx.teacherId);
      hideModal();
    }
  });
}

/* =====[ إنشاء الغرفة (المعلمة فقط) — Transaction لمنع أكتر من مكالمة نشطة لنفس المعلمة ولمنع Race Conditions ]===== */
async function createCallRoomFlow(ctx){
  const {callId, teacherId, studentId} = ctx;
  const channel = shortChannelId(callId);
  try{
    // قفل ذري: يمنع إنشاء أكتر من مكالمة نشطة لنفس المعلمة، حتى لو ضغطت على "إنشاء" من جهازين/تابين في نفس اللحظة
    const lockRef = db.ref('activeTeacherCalls/'+teacherId);
    const txResult = await lockRef.transaction(cur=>{
      if(cur && cur!==callId) return; // فيه غرفة تانية شغالة بالفعل لنفس المعلمة — نرفض ونسيب القيمة زي ما هي
      return callId;
    });
    if(!txResult.committed){
      toast('لديكِ بالفعل مكالمة نشطة مع طالبة أخرى — أنهيها أولاً');
      return;
    }
    const callRef = db.ref('calls/'+callId);
    const existingSnap = await callRef.get();
    const existing = existingSnap.val();
    // منع وجود أكثر من غرفة لنفس المحادثة: لو فيه غرفة غير منتهية بالفعل لنفس الشات، استخدميها بدل تكرارها
    if(!existing || existing.status==='ended'){
      await callRef.set({
        callId, teacherId, studentId, channel, status:'created',
        participants: { [teacherId]: true },
        createdAt: firebase.database.ServerValue.TIMESTAMP,
        startedAt: null, endedAt: null
      });
    }
  }catch(e){
    console.error(e);
    toast('تعذر إنشاء غرفة الاتصال');
  }
}
async function sendCallInvite(ctx){
  const {callId, teacherId, studentId} = ctx;
  try{
    await db.ref('calls/'+callId).update({ status:'invited' });
    const chatId = pairId(teacherId, studentId);
    const channel = shortChannelId(callId);
    await db.ref('chatThreads/'+chatId+'/messages').push({
      senderUid: state.user.uid, type:'call_invite', callId, channel,
      text:'تمت دعوتك إلى مكالمة صوتية.', ts: firebase.database.ServerValue.TIMESTAMP, read:false
    });
    bumpMessagesCounter();
    pushMessageNotification(studentId, '📞 دعوة مكالمة صوتية');
    toast('تم إرسال الدعوة داخل المحادثة');
  }catch(e){
    console.error(e);
    toast('تعذر إرسال الدعوة');
  }
}
/* المعلمة تلغي/تنهي الغرفة — يقفل الغرفة للجميع فورًا ويحرر القفل الخاص بيها */
async function teacherEndOrCancelRoom(callId, teacherId){
  try{
    await db.ref('calls/'+callId).update({ status:'ended', endedAt: firebase.database.ServerValue.TIMESTAMP });
    const lockSnap = await db.ref('activeTeacherCalls/'+teacherId).get();
    if(lockSnap.val()===callId) await db.ref('activeTeacherCalls/'+teacherId).remove();
    if(state.currentCallId===callId) endCallUI(callId);
  }catch(e){ console.error(e); }
}

/* =====[ الانضمام لغرفة الاتصال (من الشيت أو من زر الدعوة داخل الشات) ]===== */
async function joinCallRoom(callId){
  if(state.currentCallId){ if(state.currentCallId!==callId) toast('انت بالفعل في مكالمة تانية'); return; }
  try{
    const snap = await db.ref('calls/'+callId).get();
    const call = snap.val();
    if(!call || call.status==='ended'){ toast('المكالمة لم تعد متاحة'); return; }
    const myUid = state.user.uid;
    // لا يسمح بدخول أي شخص غير طرفَي هذه المحادثة تحديدًا
    if(myUid!==call.teacherId && myUid!==call.studentId){ toast('غير مسموح لك بالانضمام لهذه المكالمة'); return; }
    const peerUid = myUid===call.teacherId ? call.studentId : call.teacherId;
    const peerSnap = await db.ref('users/'+peerUid).get();
    const peerName = (peerSnap.val()||{}).name || 'مستخدم';
    await db.ref(`calls/${callId}/participants/${myUid}`).set(true);
    if(call.status!=='active'){
      await db.ref('calls/'+callId).update({ status:'active', startedAt: call.startedAt || firebase.database.ServerValue.TIMESTAMP });
    }
    openCallOverlay({uid:peerUid, name:peerName}, callId, call.channel);
    joinWebRTCCall(call.channel, callId);
  }catch(e){
    console.error(e);
    toast('تعذر الانضمام للمكالمة');
  }
}

/* =====[ إشعار عام (بانر) عبر المنصة كلها بدعوة واردة — تحسين إضافي فوق الدعوة داخل الشات نفسه ]===== */
let callPeerWatchRef = null;
function teardownCallPeerWatch(){
  if(callPeerWatchRef){ callPeerWatchRef.ref.off('value', callPeerWatchRef.cb); callPeerWatchRef=null; }
}
function listenIncomingCalls(){
  teardownCallPeerWatch();
  const myUid = state.user.uid;
  if(state.profile.role==='student'){
    const ref = db.ref('studentTeacher/'+myUid);
    const cb = snap=>{ myTeacherCache = snap.val()||null; setupCallListenersForPeers(myTeacherCache ? [myTeacherCache] : []); };
    ref.on('value', cb);
    callPeerWatchRef = {ref, cb};
  } else if(state.profile.role==='teacher'){
    const ref = db.ref('assignments/'+myUid);
    const cb = snap=>{ setupCallListenersForPeers(Object.keys(snap.val()||{})); };
    ref.on('value', cb);
    callPeerWatchRef = {ref, cb};
  } else {
    setupCallListenersForPeers([]);
  }
}
function setupCallListenersForPeers(peers){
  teardownCallListener();
  const myUid = state.user.uid;
  state._callListeners = state._callListeners || [];
  peers.forEach(peerUid=>{
    const callId = pairId(myUid, peerUid);
    const ref = db.ref('calls/'+callId);
    const cb = snap=>{
      const c = snap.val();
      if(!c) return;
      // البانر العام يظهر للطالبة فقط لحظة إرسال الدعوة (وليس مجرد إنشاء الغرفة)
      if(c.status==='invited' && myUid===c.studentId){
        if(state.currentCallId && state.currentCallId!==callId) return; // مكالمة تانية شغالة أصلاً
        showIncomingBanner(peerUid, callId);
      }
      if(c.status==='ended'){
        hideIncomingBanner();
        if(state.currentCallId===callId) endCallUI(callId);
      }
    };
    ref.on('value', cb);
    state._callListeners.push({ref, cb});
  });
}
function teardownCallListener(){
  (state._callListeners||[]).forEach(({ref,cb})=>ref.off('value',cb));
  state._callListeners = [];
}
async function showIncomingBanner(fromUid, callId){
  const snap = await db.ref('users/'+fromUid).get();
  const name = (snap.val()||{}).name || 'معلمتك';
  const banner = $('#incomingBanner');
  banner.innerHTML = `
    <div class="avatar">${initials(name)}</div>
    <div class="li-body"><b>${esc(name)}</b><span>مكالمة صوتية واردة...</span></div>
    <button class="call-btn accept" style="width:44px;height:44px;font-size:16px" id="btnAcceptIncoming">✓</button>
    <button class="call-btn reject" style="width:44px;height:44px;font-size:16px" id="btnRejectIncoming">✕</button>`;
  banner.classList.add('active');
  $('#btnAcceptIncoming').onclick = ()=>{ banner.classList.remove('active'); joinCallRoom(callId); };
  $('#btnRejectIncoming').onclick = ()=>{ banner.classList.remove('active'); };
}
function hideIncomingBanner(){ const b=$('#incomingBanner'); if(b) b.classList.remove('active'); }

/* =====[ شاشة المكالمة الكاملة (تصميم أصلي جديد بهوية المنصة) ]===== */
function openCallOverlay(peer, callId, channel){
  state.currentCallId = callId;
  const overlay = $('#callOverlay');
  overlay.innerHTML = `
    <div></div>
    <div class="call-avatar-wrap">
      <div class="soundwave" id="callSoundwave">${Array.from({length:5}).map((_,i)=>`<span style="animation-delay:${(i*0.12).toFixed(2)}s"></span>`).join('')}</div>
      <div class="pulse-ring"><div class="avatar" style="width:110px;height:110px;font-size:38px">${initials(peer.name)}</div></div>
    </div>
    <div>
      <div class="call-name">${esc(peer.name)}</div>
      <div class="call-status"><span class="call-conn-dot" id="callConnDot"></span><span id="callStatusText">جارِ الاتصال...</span></div>
      <div class="call-timer" id="callTimerText" style="display:none">00:00</div>
      <div class="call-peer-muted" id="callPeerMutedText" style="display:none">🔇 الطرف الآخر عامل كتم للميكروفون</div>
    </div>
    <div class="call-actions">
      <button class="call-btn mute" id="btnMuteCall">🎤</button>
      <button class="call-btn speaker active" id="btnSpeakerCall">🔊</button>
      <button class="call-btn end" id="btnEndCall">❌</button>
    </div>
    <audio id="callRemoteAudio" autoplay playsinline></audio>`;
  overlay.classList.add('active');
  const isTeacher = state.profile.role==='teacher';
  $('#btnEndCall').onclick = async ()=>{
    if(isTeacher){
      // إنهاء المعلمة للمكالمة يُنهيها للجميع، ويحرر قفل "مكالمة نشطة واحدة للمعلمة"
      await db.ref('calls/'+callId).update({ status:'ended', endedAt: firebase.database.ServerValue.TIMESTAMP });
      const teacherId = state.user.uid;
      const lockSnap = await db.ref('activeTeacherCalls/'+teacherId).get();
      if(lockSnap.val()===callId) await db.ref('activeTeacherCalls/'+teacherId).remove();
    } else {
      // خروج الطالبة لا يُنهي الغرفة — تقدر ترجع طالما لسه مفتوحة (حالة المكالمة تفضل 'active')
      await db.ref(`calls/${callId}/participants/${state.user.uid}`).remove();
    }
    endCallUI(callId);
  };
  $('#btnMuteCall').onclick = (e)=>{
    const btn = e.currentTarget; const muted = btn.classList.toggle('active');
    if(state.localStream) state.localStream.getAudioTracks().forEach(t=> t.enabled = !muted);
    btn.textContent = muted ? '🔇' : '🎤';
    db.ref(`calls/${callId}/muted/${state.user.uid}`).set(muted);
  };
  $('#btnSpeakerCall').onclick = (e)=>{
    const btn = e.currentTarget; const on = btn.classList.toggle('active');
    btn.textContent = on ? '🔊' : '🔈';
    $all('audio').forEach(a=>{ try{ a.muted = !on; }catch(_){} });
  };
  const otherUid = peer.uid;
  const peerMutedRef = db.ref(`calls/${callId}/muted/${otherUid}`);
  const peerMutedCb = snap=>{ const el = $('#callPeerMutedText'); if(el) el.style.display = snap.val() ? 'block' : 'none'; };
  peerMutedRef.on('value', peerMutedCb);
  state._callPeerMutedWatcher = {ref: peerMutedRef, cb: peerMutedCb};
}
function setCallConnDot(state_){
  const dot = $('#callConnDot');
  if(dot) dot.className = 'call-conn-dot ' + state_;
}
function setSoundwaveActive(active){
  const el = $('#callSoundwave');
  if(el) el.classList.toggle('speaking', !!active);
}

/* =====[ منطق WebRTC أصلي (بديل Agora) — Join / Signaling عبر Firebase / TURN مجاني (OpenRelay) ]=====
   الفكرة: بدل ما نعتمد على Agora (السيرفر بتاعه + سيرفر توكنات خارجي كانوا سبب انقطاع المكالمات)،
   بنستخدم RTCPeerConnection الأصلي في المتصفح، وبنستخدم Firebase (اللي أصلاً شغال 100% في المنصة)
   كقناة "تبادل إشارة" (Signaling) بين الطرفين تحت calls/{callId}/rtc، والـ TURN المجاني بيتكفل
   بحالات الشبكات الصعبة (فايروول/NAT) لو الاتصال المباشر فشل. الدور ثابت دايمًا: المعلمة = Offerer،
   الطالبة = Answerer — بغض النظر عن مين دخل المكالمة الأول، عشان مفيش أي Race Condition. */
async function joinWebRTCCall(channel, callId){
  try{
    // تنظيف احترازي لأي جلسة WebRTC قديمة عالقة قبل ما تبدأ جلسة جديدة
    await teardownWebRTC();
    const call = (await db.ref('calls/'+callId).get()).val();
    if(!call){ throw new Error('call-not-found'); }
    const myUid = state.user.uid;
    const isOfferer = myUid===call.teacherId;
    state._rtcRole = isOfferer ? 'offerer' : 'answerer';
    state._rtcRetryCount = 0;
    setCallConnDot('reconnecting');
    // تحسين جودة الصوت: إلغاء الصدى + تقليل الضوضاء + تحكم تلقائي في مستوى الصوت
    state.localStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true }
    });
    await startPeerConnection(callId, isOfferer);
  }catch(e){
    console.error(e);
    setCallConnDot('bad');
    const statusEl = $('#callStatusText');
    if(statusEl){
      statusEl.style.display='block';
      statusEl.innerHTML = `تعذر الدخول على المكالمة <button class="call-retry-btn" id="btnRetryJoin">إعادة المحاولة</button>`;
      $('#btnRetryJoin')?.addEventListener('click', ()=> joinWebRTCCall(channel, callId));
    }
    toast('تعذر الدخول على المكالمة — تأكد من إذن الميكروفون واتصال الإنترنت');
  }
}
/* ---------- إنشاء اتصال WebRTC وربطه بقناة الإشارة على Firebase ---------- */
async function startPeerConnection(callId, isOfferer){
  const rtcRef = db.ref('calls/'+callId+'/rtc');
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  state.pc = pc;

  state.localStream.getTracks().forEach(track=> pc.addTrack(track, state.localStream));

  const remoteStream = new MediaStream();
  const audioEl = $('#callRemoteAudio');
  if(audioEl) audioEl.srcObject = remoteStream;
  pc.ontrack = (event)=>{
    event.streams[0].getTracks().forEach(t=>{ if(!remoteStream.getTracks().includes(t)) remoteStream.addTrack(t); });
    startSoundwaveMonitor(remoteStream);
  };

  const myCandField = isOfferer ? 'offererCandidates' : 'answererCandidates';
  const peerCandField = isOfferer ? 'answererCandidates' : 'offererCandidates';

  pc.onicecandidate = (event)=>{
    if(event.candidate) rtcRef.child(myCandField).push(event.candidate.toJSON());
  };

  // مؤشر حالة الاتصال + إعادة الاتصال التلقائية عند انقطاع الشبكة (بديل reconnect بتاع Agora)
  pc.oniceconnectionstatechange = ()=>{
    const cs = pc.iceConnectionState;
    const statusEl = $('#callStatusText');
    if(cs==='connected' || cs==='completed'){
      setCallConnDot('good');
      if(statusEl) statusEl.style.display='none';
      const tm=$('#callTimerText'); if(tm) tm.style.display='block';
      if(!state.callTimerInt){
        state.callSeconds = 0;
        state.callTimerInt = setInterval(()=>{ state.callSeconds++; const el=$('#callTimerText'); if(el) el.textContent=fmtDuration(state.callSeconds); }, 1000);
      }
      state._rtcRetryCount = 0;
    } else if(cs==='checking' || cs==='disconnected'){
      setCallConnDot('reconnecting');
      if(statusEl){ statusEl.style.display='block'; statusEl.textContent='جارِ إعادة الاتصال...'; }
    } else if(cs==='failed'){
      setCallConnDot('bad');
      if(isOfferer && state._rtcRetryCount < 5){
        state._rtcRetryCount++;
        restartIce(callId, pc);
      } else if(statusEl){
        statusEl.style.display='block';
        statusEl.innerHTML = `تعذر إعادة الاتصال <button class="call-retry-btn" id="btnRetryJoin">إعادة المحاولة</button>`;
        $('#btnRetryJoin')?.addEventListener('click', ()=> joinWebRTCCall(null, callId));
      }
    }
  };

  // استقبال مرشحات ICE من الطرف التاني — child_added بيلقط الموجود سابقًا + أي جديد أول ما يوصل
  const peerCandRef = rtcRef.child(peerCandField);
  const candCb = snap=>{
    const cand = snap.val();
    if(cand){ pc.addIceCandidate(new RTCIceCandidate(cand)).catch(()=>{}); }
  };
  peerCandRef.on('child_added', candCb);
  if(isOfferer) state._rtcAnswerCandRef = {ref:peerCandRef, cb:candCb};
  else state._rtcOfferCandRef = {ref:peerCandRef, cb:candCb};

  if(isOfferer){
    // المعلمة: تمسح أي Offer/Answer قديم من جلسة سابقة، وتبعت Offer جديد
    await rtcRef.child('offer').remove();
    await rtcRef.child('answer').remove();
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await rtcRef.child('offer').set({ sdp: offer.sdp, type: offer.type });

    const answerRef = rtcRef.child('answer');
    const answerCb = snap=>{
      const ans = snap.val();
      if(ans && pc.signalingState==='have-local-offer'){
        pc.setRemoteDescription(new RTCSessionDescription(ans)).catch(e=>console.error(e));
      }
    };
    answerRef.on('value', answerCb);
    state._rtcAnswerRef = {ref:answerRef, cb:answerCb};
  } else {
    // الطالبة: تستنى وصول الـ Offer وترد عليه بـ Answer (وبترد تاني لو المعلمة عملت Restart لأي سبب)
    const offerRef = rtcRef.child('offer');
    const offerCb = async snap=>{
      const off = snap.val();
      if(!off || pc.signalingState==='closed') return;
      try{
        await pc.setRemoteDescription(new RTCSessionDescription(off));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        await rtcRef.child('answer').set({ sdp: answer.sdp, type: answer.type });
      }catch(e){ console.error(e); }
    };
    offerRef.on('value', offerCb);
    state._rtcOfferRef = {ref:offerRef, cb:offerCb};
  }
}
/* ---------- محاولة إعادة اتصال (ICE Restart) من جانب المعلمة (Offerer) عند فشل الاتصال ---------- */
async function restartIce(callId, pc){
  try{
    if(pc.signalingState==='closed') return;
    const rtcRef = db.ref('calls/'+callId+'/rtc');
    const offer = await pc.createOffer({ iceRestart:true });
    await pc.setLocalDescription(offer);
    await rtcRef.child('answer').remove();
    await rtcRef.child('offer').set({ sdp: offer.sdp, type: offer.type });
  }catch(e){ console.error(e); }
}
/* ---------- مؤشر "الموجات الصوتية" أثناء الكلام — بيعتمد على مستوى صوت حقيقي من صوت الطرف التاني ---------- */
function startSoundwaveMonitor(stream){
  try{
    if(state._rtcAnalyserRaf) cancelAnimationFrame(state._rtcAnalyserRaf);
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const actx = new AudioCtx();
    const source = actx.createMediaStreamSource(stream);
    const analyser = actx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    state._rtcAnalyserCtx = actx;
    const tick = ()=>{
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((a,b)=>a+b,0)/data.length;
      setSoundwaveActive(avg > 8);
      state._rtcAnalyserRaf = requestAnimationFrame(tick);
    };
    tick();
  }catch(_){ /* تجاهل لو المتصفح مايدعمش AnalyserNode — ميض المكالمة نفسها بتفضل شغالة عادي */ }
}
/* ---------- إزالة كل مستمعي/موارد WebRTC بالكامل ومنع تسريب الذاكرة ---------- */
async function teardownWebRTC(){
  if(state._rtcAnalyserRaf){ cancelAnimationFrame(state._rtcAnalyserRaf); state._rtcAnalyserRaf=null; }
  if(state._rtcAnalyserCtx){ try{ state._rtcAnalyserCtx.close(); }catch(_){} state._rtcAnalyserCtx=null; }
  if(state._rtcOfferRef){ state._rtcOfferRef.ref.off('value', state._rtcOfferRef.cb); state._rtcOfferRef=null; }
  if(state._rtcAnswerRef){ state._rtcAnswerRef.ref.off('value', state._rtcAnswerRef.cb); state._rtcAnswerRef=null; }
  if(state._rtcOfferCandRef){ state._rtcOfferCandRef.ref.off('child_added', state._rtcOfferCandRef.cb); state._rtcOfferCandRef=null; }
  if(state._rtcAnswerCandRef){ state._rtcAnswerCandRef.ref.off('child_added', state._rtcAnswerCandRef.cb); state._rtcAnswerCandRef=null; }
  if(state.pc){ try{ state.pc.close(); }catch(_){} state.pc=null; }
  if(state.localStream){ try{ state.localStream.getTracks().forEach(t=>t.stop()); }catch(_){} state.localStream=null; }
  const audioEl = $('#callRemoteAudio'); if(audioEl) audioEl.srcObject = null;
  state._rtcRole = null; state._rtcRetryCount = 0;
}
async function endCallUI(callId){
  hideIncomingBanner();
  $('#callOverlay').classList.remove('active');
  clearInterval(state.callTimerInt); state.callTimerInt=null;
  setSoundwaveActive(false);
  // إزالة كل موارد WebRTC بالكامل ومنع تسريب الذاكرة — Destroy/Cleanup شامل، ومنع Duplicate Events في الجلسة الجاية
  await teardownWebRTC();
  if(state._callPeerMutedWatcher){ state._callPeerMutedWatcher.ref.off('value', state._callPeerMutedWatcher.cb); state._callPeerMutedWatcher=null; }
  try{ if(callId) db.ref(`calls/${callId}/muted/${state.user.uid}`).remove(); }catch(_){}
  state.currentCallId = null;
}

/* =====[ التقاط زر "الانضمام للمكالمة" داخل فقاعة الدعوة بالشات ]===== */
document.addEventListener('click', e=>{
  const btn = e.target.closest('.call-invite-join-btn');
  if(!btn) return;
  const callId = btn.dataset.callId;
  if(callId) joinCallRoom(callId);
});
/* =====[ SECTION: BOOTSTRAP ]===== */
render();
</script>
