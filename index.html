      <select id="genPlan"><option value="trial">تجربة 3 أيام</option><option value="monthly">شهري</option><option value="quarterly">ربع سنوي</option></select>

      logAdminAction('generate_key', `${code} · ${type} · ${plan}${owner?(' · '+owner):''}`);

let usersFilter='all';
let usersState = { search:'', sort:'newest', page:1 };
const USERS_PAGE_SIZE = 12;
let _usersCache = {};
let _financeCache = {};
async function loadAdminUsers(){
  try{
  const [usersSnap, financeSnap] = await Promise.all([ db.ref('users').get(), db.ref('finance').get() ]);
  _usersCache = usersSnap.val()||{};
  _financeCache = financeSnap.val()||{};
  renderUsersList(_usersCache);
  $all('.segmented [data-f]').forEach(b=>b.addEventListener('click', ()=>{
    usersFilter=b.dataset.f; usersState.page=1; $all('.segmented [data-f]').forEach(x=>x.classList.remove('active')); b.classList.add('active');
    renderUsersList(_usersCache);
  }));
  $('#usersSearch').value = usersState.search;
  $('#usersSort').value = usersState.sort;
  let searchDebounce = null;
  $('#usersSearch').addEventListener('input', e=>{
    clearTimeout(searchDebounce);
    const val = e.target.value;
    searchDebounce = setTimeout(()=>{ usersState.search=val; usersState.page=1; renderUsersList(_usersCache); }, 300);
  });
  $('#usersSort').addEventListener('change', e=>{ usersState.sort=e.target.value; usersState.page=1; renderUsersList(_usersCache); });
  $('#btnExportUsersCSV').addEventListener('click', ()=>exportUsersCSV(_usersCache));
  }catch(e){ showLoadError('usersList', e); }
}
function exportUsersCSV(users){
  // بيصدّر المستخدمين اللي ظاهرين حاليًا (بعد أي فلترة/بحث مطبّق) — نفس منطق تصدير المفاتيح
  let entries = Object.entries(users);
  if(usersFilter==='teacher') entries = entries.filter(([,u])=>u.role==='teacher');
  else if(usersFilter==='student') entries = entries.filter(([,u])=>u.role==='student');
  else if(usersFilter==='pending') entries = entries.filter(([,u])=>u.status==='pending');
  else if(usersFilter==='banned') entries = entries.filter(([,u])=>u.status==='banned');
  const s = usersState.search.trim().toLowerCase();
  if(s) entries = entries.filter(([,u])=>(u.name||'').toLowerCase().includes(s) || (u.username||'').toLowerCase().includes(s));
  if(!entries.length){ toast('لا توجد بيانات للتصدير'); return; }
  const header = ['name','username','role','status','createdAt'];
  const rows = entries.map(([id,u])=>[
    (u.name||'').replace(/,/g,' '), u.username||'', u.role||'', u.status||'',
    u.createdAt?new Date(u.createdAt).toISOString():''
  ]);
  const csv = [header, ...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rawasekh-users-'+Date.now()+'.csv';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  toast('جارِ تنزيل الملف');
}
function renderUsersList(users){
  let entries = Object.entries(users);
  if(usersFilter==='teacher') entries = entries.filter(([,u])=>u.role==='teacher');
  else if(usersFilter==='student') entries = entries.filter(([,u])=>u.role==='student');
  else if(usersFilter==='pending') entries = entries.filter(([,u])=>u.status==='pending');
  else if(usersFilter==='banned') entries = entries.filter(([,u])=>u.status==='banned');
  const s = usersState.search.trim().toLowerCase();
  if(s) entries = entries.filter(([,u])=>(u.name||'').toLowerCase().includes(s) || (u.username||'').toLowerCase().includes(s));
  if(usersState.sort==='oldest') entries.sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  else if(usersState.sort==='name') entries.sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||'', 'ar'));
  else entries.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));

  const totalPages = Math.max(1, Math.ceil(entries.length/USERS_PAGE_SIZE));
  if(usersState.page>totalPages) usersState.page = totalPages;
  const pageEntries = entries.slice((usersState.page-1)*USERS_PAGE_SIZE, usersState.page*USERS_PAGE_SIZE);

  $('#usersList').innerHTML = pageEntries.length ? pageEntries.map(([id,u])=>`
    <div class="list-item">
      <div class="avatar">${initials(u.name)}</div>
      <div class="li-body"><b>${esc(u.name)}</b><span>@${esc(u.username)} · ${u.role==='teacher'?'معلمة':u.role==='admin'?'أدمن':'طالب'}</span></div>
      <div class="li-meta">
        <span class="chip ${u.status==='active'?'ok':u.status==='banned'?'danger':'warn'}">${u.status==='active'?'مفعّل':u.status==='banned'?'موقوف':'قيد المراجعة'}</span>
        ${u.role==='teacher' ? `<span class="chip ${((_financeCache[id]&&_financeCache[id].balance)||0)>0?'ok':'neutral'}">💰 ${((_financeCache[id]&&_financeCache[id].balance)||0).toLocaleString('ar-EG')} ج.م</span>` : ''}
        ${u.role!=='admin' ? `<button class="btn sm ${u.status==='banned'?'ghost':'danger'}" data-toggleban="${id}" data-cur="${u.status}">${u.status==='banned'?'رفع الإيقاف':'إيقاف'}</button>` : ''}
      </div>
    </div>
    ${u.role!=='admin' ? `
    <div class="key-actions-row" style="margin-bottom:10px">
      ${u.role==='teacher' ? `<button class="btn sm" data-finance="${id}" data-name="${esc(u.name)}">💰 إدارة الرصيد</button>` : ''}
      <button class="btn sm ghost" data-changerole="${id}">${u.role==='teacher'?'تحويل لطالب':'تحويل لمعلمة'}</button>
      ${u.role==='student' ? `<button class="btn sm ghost" data-reassign="${id}">نقل لمعلمة أخرى</button>` : ''}
      <button class="btn sm ghost" data-resetpass="${id}">إعادة تعيين كلمة المرور</button>
      <button class="btn sm ghost" data-forcelogout="${id}">إجبار الخروج</button>
      <button class="btn sm danger" data-deleteuser="${id}">حذف نهائي</button>
    </div>` : ''}`).join('') : '<div class="empty-state">لا يوجد مستخدمين</div>';

  $('#usersPagination').innerHTML = entries.length ? `
    <button class="btn sm ghost" id="btnUsersPrev" ${usersState.page<=1?'disabled':''}>السابق</button>
    <span>صفحة ${usersState.page} من ${totalPages}</span>
    <button class="btn sm ghost" id="btnUsersNext" ${usersState.page>=totalPages?'disabled':''}>التالي</button>` : '';
  $('#btnUsersPrev')?.addEventListener('click', ()=>{ usersState.page--; renderUsersList(users); });
  $('#btnUsersNext')?.addEventListener('click', ()=>{ usersState.page++; renderUsersList(users); });

  $all('[data-toggleban]').forEach(b=>b.addEventListener('click', async ()=>{
    const newStatus = b.dataset.cur==='banned' ? 'active' : 'banned';
    await db.ref('users/'+b.dataset.toggleban+'/status').set(newStatus);
    toast(newStatus==='banned'?'تم إيقاف الحساب':'تم تفعيل الحساب');
    loadAdminUsers();
  }));
  $all('[data-finance]').forEach(b=>b.addEventListener('click', ()=>openTeacherFinanceModal(b.dataset.finance, b.dataset.name)));
  $all('[data-changerole]').forEach(b=>b.addEventListener('click', ()=>changeUserRole(b.dataset.changerole, users[b.dataset.changerole])));
  $all('[data-reassign]').forEach(b=>b.addEventListener('click', ()=>openReassignTeacherModal(b.dataset.reassign, users[b.dataset.reassign])));
  $all('[data-resetpass]').forEach(b=>b.addEventListener('click', ()=>resetUserPassword(users[b.dataset.resetpass])));
  $all('[data-forcelogout]').forEach(b=>b.addEventListener('click', ()=>forceLogoutUser(b.dataset.forcelogout)));
  $all('[data-deleteuser]').forEach(b=>b.addEventListener('click', ()=>deleteUserCompletely(b.dataset.deleteuser, users[b.dataset.deleteuser])));
}
// تحويل دور المستخدم — بيفك أي ربط طالب/معلمة قديم تلقائيًا عشان منسيبش بيانات معلّقة
async function changeUserRole(uid, u){
  if(!u) return;
  const newRole = u.role==='teacher' ? 'student' : 'teacher';
  if(!confirm(`تحويل "${u.name}" إلى ${newRole==='teacher'?'معلمة':'طالب'}؟ سيتم فك أي ربط تدريس/متابعة سابق.`)) return;
  try{
    const updates = {}; updates['users/'+uid+'/role'] = newRole;
    if(u.role==='teacher'){
      const aSnap = await db.ref('assignments/'+uid).get();
      const myStudents = Object.keys(aSnap.val()||{});
      updates['assignments/'+uid] = null;
      for(const sid of myStudents){
        const stSnap = await db.ref('studentTeacher/'+sid).get();
        if(stSnap.val()===uid) updates['studentTeacher/'+sid] = null;
      }
    } else if(u.role==='student'){
      const stSnap = await db.ref('studentTeacher/'+uid).get();
      const myTeacher = stSnap.val();
      if(myTeacher) updates['assignments/'+myTeacher+'/'+uid] = null;
      updates['studentTeacher/'+uid] = null;
    }
    await db.ref().update(updates);
    logAdminAction('change_role', `${u.name} → ${newRole==='teacher'?'معلمة':'طالب'}`);
    toast('تم تحويل الدور');
    await loadAdminUsers();
  }catch(e){ toast('تعذر تحويل الدور: '+(e.message||'')); }
}
// إدارة رصيد/مستحقات المعلمة — الأدمن يقدر يشوف الرصيد الحالي وآخر الحركات، ويضيف
// أو يخصم مبلغ مع سبب اختياري. كل حركة بتتسجل في finance/{teacherUid}/transactions
// كسجل ثابت (append-only)، والرصيد الحالي بيتحدّث كمجموع بـ increment (عملية ذرّية
// من فايربيس، فمينفعش حركتين يحصل بينهم تعارض حتى لو حصلوا في نفس اللحظة بالظبط).
function openTeacherFinanceModal(teacherUid, teacherName){
  showModal(`
    <h3>رصيد ${esc(teacherName)}</h3>
    <div class="card" style="margin-bottom:14px;text-align:center">
      <div style="font-size:12px;color:var(--text-dim)">الرصيد الحالي</div>
      <div id="financeBalanceDisplay" style="font-size:26px;font-weight:800;margin-top:4px">…</div>
    </div>
    <div class="field"><label>المبلغ (جنيه)</label><input id="financeAmount" type="number" step="0.01" placeholder="مثال: 500"></div>
    <div class="field"><label>سبب الحركة (اختياري)</label><input id="financeNote" placeholder="مثال: مستحقات شهر يوليو"></div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="btnFinanceAdd" style="flex:1">➕ إضافة</button>
      <button class="btn danger" id="btnFinanceDeduct" style="flex:1">➖ خصم</button>
    </div>
    <button class="btn ghost" id="btnFinanceReset" style="margin-top:8px">💵 تصفير الرصيد (تم الصرف الشهري)</button>
    <div class="section-title" style="margin-top:16px">آخر الحركات</div>
    <div id="financeTxList"><div class="empty-state">جارِ التحميل...</div></div>`);

  const finRef = db.ref('finance/'+teacherUid);
  async function refreshFinanceModal(){
    const snap = await finRef.get();
    const data = snap.val()||{};
    const bal = data.balance||0;
    const balEl = $('#financeBalanceDisplay');
    if(balEl) balEl.textContent = bal.toLocaleString('ar-EG')+' ج.م';
    const txs = Object.entries(data.transactions||{}).sort((a,b)=>(b[1].ts||0)-(a[1].ts||0)).slice(0,15);
    const listEl = $('#financeTxList');
    if(listEl){
      listEl.innerHTML = txs.length ? txs.map(([,t])=>`
        <div class="list-item">
          <div class="li-body"><b style="color:${t.amount>=0?'var(--success)':'var(--danger)'}">${t.amount>=0?'+':''}${t.amount.toLocaleString('ar-EG')} ج.م</b><span>${esc(t.note||'—')}</span></div>
          <div class="li-meta"><span class="chip neutral">${fmtDate(t.ts)}</span></div>
        </div>`).join('') : '<div class="empty-state">لا توجد حركات بعد</div>';
    }
  }
  refreshFinanceModal();

  async function applyFinanceDelta(sign){
    const raw = parseFloat($('#financeAmount').value);
    if(!raw || raw<=0){ toast('اكتب مبلغ صحيح أكبر من صفر'); return; }
    const amount = sign * raw;
    const note = $('#financeNote').value.trim();
    const btnAdd = $('#btnFinanceAdd'), btnDed = $('#btnFinanceDeduct');
    if(btnAdd) btnAdd.disabled = true; if(btnDed) btnDed.disabled = true;
    try{
      await finRef.child('transactions').push({
        amount, note: note||null, byUid: state.user.uid, byName: state.profile?.name||'', ts: firebase.database.ServerValue.TIMESTAMP
      });
      await finRef.update({ balance: firebase.database.ServerValue.increment(amount), updatedAt: firebase.database.ServerValue.TIMESTAMP });
      logAdminAction('teacher_finance', `${sign>0?'إضافة':'خصم'} ${raw} ج.م لـ ${teacherName}${note?(' — '+note):''}`);
      $('#financeAmount').value=''; $('#financeNote').value='';
      toast(sign>0?'تم إضافة المبلغ':'تم خصم المبلغ');
      await refreshFinanceModal();
      loadAdminUsers(); // تحديث الشريحة (chip) في القائمة الخلفية بعد قفل الـ modal
    }catch(e){ toast('تعذر تنفيذ العملية: '+(e.message||'')); }
    finally{ if(btnAdd) btnAdd.disabled=false; if(btnDed) btnDed.disabled=false; }
  }
  $('#btnFinanceAdd').addEventListener('click', ()=>applyFinanceDelta(1));
  $('#btnFinanceDeduct').addEventListener('click', ()=>applyFinanceDelta(-1));

  // تصفير الرصيد بعد الصرف الشهري: بيسجّل حركة خصم بقيمة الرصيد الحالي بالظبط (مش تعديل مباشر على الرقم)
  // عشان السجل التاريخي للحركات يفضل صحيح ومتّسق، والرصيد يرجع صفر استعدادًا للشهر الجديد.
  $('#btnFinanceReset').addEventListener('click', async ()=>{
    const btnReset = $('#btnFinanceReset');
    const snap = await finRef.get();
    const bal = (snap.val()||{}).balance||0;
    if(!bal){ toast('الرصيد صفر بالفعل'); return; }
    if(!confirm(`تصفير رصيد "${teacherName}" الحالي (${bal.toLocaleString('ar-EG')} ج.م) بعد صرفه؟ هيتسجل كحركة "تمت التسوية" ولن يمكن التراجع عنها إلا بإضافة رصيد يدويًا.`)) return;
    btnReset.disabled = true;
    try{
      const amount = -bal;
      await finRef.child('transactions').push({
        amount, note:'تصفية الرصيد بعد الصرف', byUid: state.user.uid, byName: state.profile?.name||'', ts: firebase.database.ServerValue.TIMESTAMP
      });
      await finRef.update({ balance: firebase.database.ServerValue.increment(amount), updatedAt: firebase.database.ServerValue.TIMESTAMP });
      logAdminAction('teacher_finance', `تصفية رصيد ${teacherName} (${bal.toLocaleString('ar-EG')} ج.م) بعد الصرف`);
      toast('تم تصفير الرصيد');
      await refreshFinanceModal();
      loadAdminUsers();
    }catch(e){ toast('تعذر تصفير الرصيد: '+(e.message||'')); }
    finally{ btnReset.disabled = false; }
  });
}
// نقل طالب لمعلمة أخرى (بديل سريع لتبويب "الربط" الكامل، من نفس شاشة المستخدمين)
function openReassignTeacherModal(studentUid, student){
  if(!student) return;
  db.ref('users').get().then(snap=>{
    const users = snap.val()||{};
    const teachers = Object.entries(users).filter(([,u])=>u.role==='teacher');
    showModal(`
      <h3>نقل "${esc(student.name)}" لمعلمة أخرى</h3>
      <div class="field"><label>اختر المعلمة</label>
        <select id="reassignTeacherSelect">
          <option value="">— بدون معلمة —</option>
          ${teachers.map(([id,t])=>`<option value="${id}">${esc(t.name)}</option>`).join('')}
        </select>
      </div>
      <button class="btn" id="btnConfirmReassign">تأكيد النقل</button>`);
    db.ref('studentTeacher/'+studentUid).get().then(cur=>{
      const sel = $('#reassignTeacherSelect');
      if(sel && cur.val()) sel.value = cur.val();
    });
    $('#btnConfirmReassign').addEventListener('click', async ()=>{
      const newTeacher = $('#reassignTeacherSelect').value;
      const btn = $('#btnConfirmReassign'); btn.disabled = true;
      try{
        const curSnap = await db.ref('studentTeacher/'+studentUid).get();
        const prevT = curSnap.val();
        const updates = {};
        if(prevT) updates['assignments/'+prevT+'/'+studentUid] = null;
        if(newTeacher){ updates['assignments/'+newTeacher+'/'+studentUid] = true; updates['studentTeacher/'+studentUid] = newTeacher; }
        else { updates['studentTeacher/'+studentUid] = null; }
        await db.ref().update(updates);
        hideModal(); toast('تم تحديث الربط'); await loadAdminUsers();
      }catch(e){ toast('تعذر النقل: '+(e.message||'')); btn.disabled=false; }
    });
  });
}
// إعادة تعيين كلمة المرور: بيرسل رابط Firebase القياسي لبريد الحساب الداخلي (username@rawasekh.app).
// ملاحظة مهمة: طالما الحسابات بتستخدم بريد داخلي وهمي (مش بريد حقيقي للمستخدم)، الرابط ده
// هيتبعت لصندوق بريد مالوش صاحب فعليًا. تفعيل إعادة تعيين حقيقية للمستخدم يحتاج إما بريد
// استرجاع حقيقي مخزّن في الملف الشخصي، أو Cloud Function بصلاحيات Admin SDK لتغيير كلمة
// المرور مباشرة (التطبيق ده ملف واحد بدون سيرفر فمفيش وصول لـ Admin SDK من هنا).
async function resetUserPassword(u){
  if(!u || !u.username){ toast('لا يوجد اسم مستخدم لهذا الحساب'); return; }
  if(!confirm('سيتم إرسال رابط إعادة تعيين كلمة المرور القياسي من Firebase. تنبيه: الحسابات هنا تستخدم بريدًا داخليًا وهميًا، فهذا الرابط لن يصل لصندوق بريد حقيقي للمستخدم إلا لو تم ربط بريد استرجاع حقيقي لاحقًا. متابعة؟')) return;
  try{ await auth.sendPasswordResetEmail(usernameToEmail(u.username)); toast('تم إرسال طلب إعادة التعيين لبريد الحساب الداخلي'); }
  catch(e){ toast('تعذر الإرسال: '+(e.message||'')); }
}
// إجبار تسجيل الخروج: بيسجّل وقت الأمر في users/{uid}/forceLogoutAt، والمستمع الدائم على
// بروفايل المستخدم (auth.onAuthStateChanged) بيقارنه بلحظة بداية جلسته الحالية ويسجّل خروجه
// فورًا لو الأمر أحدث من دخوله — بيشتغل بمجرد ما يوصل التحديث Realtime، من غير أي تحديث يدوي للصفحة.
async function forceLogoutUser(uid){
  if(!confirm('إجبار هذا المستخدم على تسجيل الخروج الآن؟')) return;
  try{ await db.ref('users/'+uid).update({forceLogoutAt: firebase.database.ServerValue.TIMESTAMP}); toast('تم إرسال أمر تسجيل الخروج'); }
  catch(e){ toast('تعذر التنفيذ: '+(e.message||'')); }
}
// حذف مستخدم بالكامل: البروفايل، اسم المستخدم المحجوز، الحضور، التقدم، روابط التدريس/المتابعة،
// محادثاته ومكالماته مع الطرف المرتبط به (ملفات الشات المرفوعة كمان تتحذف من Storage قبل حذف الثريد).
// ملاحظة مهمة: العميل (Client SDK) مينفعش يحذف حساب مستخدم *تاني* من Firebase Authentication —
// ده متاح بس للمستخدم يحذف حساب نفسه، أو عبر Admin SDK من سيرفر/Cloud Function. الحذف هنا بيمسح
// كل بيانات الحساب فعليًا ويمنعه نهائيًا من الوصول لأي شيء في التطبيق، لكن سجل الدخول (Email/Password)
// هيفضل موجود في Firebase Authentication نفسه حتى تضيفوا Cloud Function لحذفه من هناك كمان.
async function deleteUserCompletely(uid, u){
  if(!u) return;
  if(!confirm(`سيتم حذف حساب "${u.name}" وكل بياناته (محادثات، مكالمات، ${u.role==='teacher'?'روابط طلابه':'تقدمه وربطه بمعلمته'}) نهائيًا. لا يمكن التراجع.\n\nملاحظة: هذا لا يحذف الحساب من Firebase Authentication نفسه (يتطلب Cloud Function من السيرفر)، لكنه سيُقفل نهائيًا وتُمسح كل بياناته.\n\nمتابعة؟`)) return;
  try{
    const updates = {};
    updates['users/'+uid] = null;
    updates['presence/'+uid] = null;
    updates['progress/'+uid] = null;
    if(u.username) updates['usernames/'+u.username] = null;

    let peers = [];
    if(u.role==='teacher'){
      const aSnap = await db.ref('assignments/'+uid).get();
      const myStudents = Object.keys(aSnap.val()||{});
      peers = myStudents;
      updates['assignments/'+uid] = null;
      updates['schedules/'+uid] = null; // جدول حلقات المعلمة بالكامل
      updates['finance/'+uid] = null; // ملاحظة: بيمسح سجل الرصيد والحركات كمان — لو محتاجين نحتفظ بالسجل المالي للأرشيف حتى بعد حذف الحساب، شيلوا السطر ده
      for(const sid of myStudents){
        const stSnap = await db.ref('studentTeacher/'+sid).get();
        if(stSnap.val()===uid) updates['studentTeacher/'+sid] = null;
      }
    } else if(u.role==='student'){
      const stSnap = await db.ref('studentTeacher/'+uid).get();
      const myTeacher = stSnap.val();
      if(myTeacher){ peers = [myTeacher]; updates['assignments/'+myTeacher+'/'+uid] = null; updates['schedules/'+myTeacher+'/'+uid] = null; }
      updates['studentTeacher/'+uid] = null;
    }

    for(const peer of peers){
      const chatId = pairId(uid, peer);
      try{
        const msgsSnap = await db.ref('chatThreads/'+chatId+'/messages').get();
        const msgs = msgsSnap.val()||{};
        await Promise.all(Object.values(msgs).map(async m=>{
          if((m.type==='image'||m.type==='file') && m.url){
            // بقينا بنستخدم Cloudinary مش Firebase Storage، وحذف ملف من Cloudinary محتاج
            // طلب "موقّع" بمفتاح سري (API Secret) — ده مينفعش يتعمل من المتصفح بأمان
            // (أي حد كان هيقدر يشوفه ويحذف ملفات غيره). فبنسيب ملف الميديا نفسه
            // زي ما هو على Cloudinary (مش هيتحسب عليك فلوس، بس هياخد مساحة من الكوتة
            // المجانية)، وبنكتفي بمسح الرسالة والداتا من قاعدة البيانات بس.
          }
        }));
      }catch(_){}
      updates['chatThreads/'+chatId] = null;
      updates['calls/'+chatId] = null;
    }

    await db.ref().update(updates);
    logAdminAction('delete_user', `${u.name} (${u.role==='teacher'?'معلمة':'طالب'})`);
    toast('تم حذف الحساب وكل بياناته');
    await loadAdminUsers();
  }catch(e){ toast('تعذر حذف الحساب بالكامل: '+(e.message||'')); }
}

function tplAdminAssign(){
  return `<div class="section-title">ربط الطلاب بالمعلمات</div><div id="assignArea"><div class="empty-state">جارِ التحميل...</div></div>`;

async function loadAdminAssign(){
  try{
  const [usersSnap, assignSnap] = await Promise.all([db.ref('users').get(), db.ref('assignments').get()]);
  const users = usersSnap.val()||{}; const assignments = assignSnap.val()||{};
  const teachers = Object.entries(users).filter(([,u])=>u.role==='teacher');
  const students = Object.entries(users).filter(([,u])=>u.role==='student');
  $('#assignArea').innerHTML = teachers.map(([tid,t])=>{
    const myStudents = assignments[tid]?Object.keys(assignments[tid]):[];
    return `<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="avatar">${initials(t.name)}</div>
        <div><b>${esc(t.name)}</b><br><span style="font-size:12px;color:var(--text-dim)">${myStudents.length} طالب مخصص</span></div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        ${students.map(([sid,s])=>`
          <label style="display:flex;align-items:center;gap:6px;background:var(--surface-2);padding:6px 10px;border-radius:10px;font-size:13px">
            <input type="checkbox" data-assign-t="${tid}" data-assign-s="${sid}" ${myStudents.includes(sid)?'checked':''}> ${esc(s.name)}
          </label>`).join('')}
      </div>
    </div>`;
  }).join('') || '<div class="empty-state">لا توجد معلمات بعد</div>';
  $all('[data-assign-t]').forEach(chk=>chk.addEventListener('change', async ()=>{
    const t=chk.dataset.assignT, s=chk.dataset.assignS;
    chk.disabled = true;
    try{
      if(chk.checked){
        // كل طالب مربوط بمعلمة واحدة بس، فلو كان مربوط بمعلمة تانية نفصله منها الأول
        const curSnap = await db.ref(`studentTeacher/${s}`).get();
        const prevT = curSnap.val();
        if(prevT && prevT!==t){
          await db.ref(`assignments/${prevT}/${s}`).remove();
          const prevChk = document.querySelector(`[data-assign-t="${prevT}"][data-assign-s="${s}"]`);
          if(prevChk) prevChk.checked = false;
        }
        await db.ref(`assignments/${t}/${s}`).set(true);
        await db.ref(`studentTeacher/${s}`).set(t); // فهرس عكسي: الطالب يقرأ سطر واحد بس مش كل شجرة assignments
      } else {
        await db.ref(`assignments/${t}/${s}`).remove();
        const cur = await db.ref(`studentTeacher/${s}`).get();
        if(cur.exists() && cur.val()===t) await db.ref(`studentTeacher/${s}`).remove();
      }
      toast('تم تحديث الربط');
    }catch(e){
      chk.checked = !chk.checked;
      toast('تعذر تحديث الربط: '+(e.message||''));
    } finally { chk.disabled = false; }
  }));
  }catch(e){ showLoadError('assignArea', e); }
}

/* =====[ SECTION: ADMIN — مراجعة كل المحادثات ]=====
   ميزة جديدة: الأدمن يقدر يشوف أي محادثة بين معلمة وطالب/ة كاملة، وحتى لو
   الطرفين حذفوا رسائل بينهم (عندهم فقط أو لدى الجميع)، المحتوى الأصلي بيفضل
   ظاهر بالكامل عند الأدمن هنا — الحذف بتاع الطرفين شكل واجهة بس عندهم، ومحصلش
   فعليًا مسح للمحتوى من قاعدة البيانات (أنظر deleteMessage). */
function tplAdminChats(){
  return `<div class="field"><input id="adminChatsSearch" placeholder="بحث بالاسم..."></div>
  <div id="adminChatsList"><div class="empty-state">جارِ التحميل...</div></div>`;
}
// chatId عبارة عن pairId(uidA,uidB) = [a,b].sort().join('_')؛ عشان نستخرج
// الاتنين تاني من غير أي افتراض عن شكل الـ uid، بنجرب كل uid معروف من users/
// كبداية محتملة للـ chatId ونتحقق إن pairId بتاعه بيطابق الـ chatId فعليًا.
function findParticipantsForChatId(chatId, knownUids){
  for(const uid of knownUids){
    if(chatId.startsWith(uid+'_')){
      const other = chatId.slice(uid.length+1);
      if(other && pairId(uid, other)===chatId) return [uid, other];
    }
  }
  return null;
}
let adminChatsCache = [];
async function loadAdminChats(){
  try{
    const [usersSnap, chatsSnap] = await Promise.all([db.ref('users').get(), db.ref('chatThreads').get()]);
    const users = usersSnap.val()||{};
    const knownUids = Object.keys(users);
    const chats = chatsSnap.val()||{};
    adminChatsCache = Object.entries(chats).map(([chatId, thread])=>{
      const msgs = Object.entries(thread.messages||{});
      const lastMsg = msgs.map(([,m])=>m).sort((a,b)=>(b.ts||0)-(a.ts||0))[0];
      const participants = findParticipantsForChatId(chatId, knownUids);
      const nameA = participants ? (users[participants[0]]?.name || 'مستخدم محذوف') : 'غير معروف';
      const nameB = participants ? (users[participants[1]]?.name || 'مستخدم محذوف') : 'غير معروف';
      // خريطة uid → اسم، عشان نقدر نبيّن جنب كل رسالة هي مبعوتة من مين بالظبط
      const namesMap = participants ? { [participants[0]]: nameA, [participants[1]]: nameB } : {};
      return { chatId, nameA, nameB, count: msgs.length, lastTs: lastMsg ? (lastMsg.ts||0) : 0, namesMap };
    }).sort((a,b)=> b.lastTs - a.lastTs);
    renderAdminChatsList(adminChatsCache);
    $('#adminChatsSearch').addEventListener('input', e=>{
      const q = e.target.value.trim().toLowerCase();
      const filtered = q ? adminChatsCache.filter(r=> (r.nameA+' '+r.nameB).toLowerCase().includes(q)) : adminChatsCache;
      renderAdminChatsList(filtered);
    });
  }catch(e){ showLoadError('adminChatsList', e); }
}
function renderAdminChatsList(rows){
  const listEl = $('#adminChatsList');
  if(!listEl) return;
  if(!rows.length){ listEl.innerHTML = '<div class="empty-state">لا توجد محادثات</div>'; return; }
  listEl.innerHTML = rows.map(r=>`
    <div class="list-item" data-chat-id="${esc(r.chatId)}">
      <div class="avatar">${initials(r.nameA)}</div>
      <div class="li-body"><b>${esc(r.nameA)} ↔ ${esc(r.nameB)}</b><span>${r.count} رسالة${r.lastTs ? ' · آخر رسالة '+fmtDate(r.lastTs)+' '+fmtTime(r.lastTs) : ''}</span></div>
    </div>`).join('');
  $all('.list-item[data-chat-id]', listEl).forEach(el=>{
    el.addEventListener('click', ()=>{
      const row = rows.find(r=>r.chatId===el.dataset.chatId);
      if(row) openAdminChatView(row.chatId, row.nameA+' ↔ '+row.nameB, row.namesMap);
    });
  });
}
let adminChatViewRef = null, adminChatViewCb = null, adminChatNamesMap = {};
function openAdminChatView(chatId, title, namesMap){
  adminChatNamesMap = namesMap || {};
  $('#adminChatTitle').textContent = title;
  $('#adminChatBody').innerHTML = '<div class="bubble system">جارِ تحميل المحادثة...</div>';
  $('#adminChatOverlay').classList.add('active');
  pushNav('adminChatView');
  if(adminChatViewRef) adminChatViewRef.off('value', adminChatViewCb);
  adminChatViewRef = db.ref('chatThreads/'+chatId+'/messages');
  adminChatViewCb = snap=>{
    const msgs = snap.val()||{};
    const body = $('#adminChatBody');
    if(!body) return;
    const entries = Object.entries(msgs).sort((a,b)=>(a[1].ts||0)-(b[1].ts||0));
    body.innerHTML = entries.map(([id,m])=> renderAdminChatBubble(m, adminChatNamesMap)).join('') || `<div class="bubble system">لا توجد رسائل في هذه المحادثة</div>`;
    body.scrollTop = body.scrollHeight;
  };
  adminChatViewRef.on('value', adminChatViewCb);
}
function closeAdminChatView(fromBack){
  if(adminChatViewRef){ adminChatViewRef.off('value', adminChatViewCb); adminChatViewRef=null; adminChatViewCb=null; }
  $('#adminChatOverlay').classList.remove('active');
  if(!fromBack) popNavIfMatches('adminChatView');
}
// نسخة عرض فقط، من غير أي إمكانية حذف/رد، وبتوضّح حالة الحذف بدل ما تخفي المحتوى
function renderAdminChatBubble(m, namesMap){
  const deletedTag = m.deleted ? `<div class="admin-del-tag">🗑️ حذفها المرسل لدى الجميع — ظاهرة هنا للأدمن بس</div>` : '';
  const hiddenForTag = (m.deletedFor && Object.keys(m.deletedFor).length) ? `<div class="admin-del-tag">🙈 حذفها أحد الطرفين عنده فقط — ظاهرة هنا للأدمن بس</div>` : '';
  // اسم المرسل الحقيقي (مش "them" ثابتة)، عشان الأدمن يعرف كل رسالة مبعوتة من مين بالظبط
  const senderName = (namesMap && namesMap[m.senderUid]) || 'مستخدم غير معروف';
  const senderTag = `<div class="admin-sender-tag">✍️ ${esc(senderName)}</div>`;
  if(m.type==='image'){
    return `<div class="bubble media them">
      ${senderTag}
      <div class="chat-img-wrap"><img class="chat-img" src="${esc(m.url||'')}" loading="lazy"><div class="meta">${fmtTime(m.ts)}</div></div>
      ${deletedTag}${hiddenForTag}
    </div>`;
  }
  if(m.type==='audio'){
    const dur = m.duration ? (String(Math.floor(m.duration/60)).padStart(2,'0')+':'+String(m.duration%60).padStart(2,'0')) : '';
    return `<div class="bubble audio-bubble them">
      ${senderTag}
      🎤 <audio controls preload="none" src="${esc(m.url||'')}"></audio>
      <div class="meta">${dur?dur+' · ':''}${fmtTime(m.ts)}</div>
      ${deletedTag}${hiddenForTag}
    </div>`;
  }
  if(m.type==='file'){
    return `<div class="bubble file-bubble them">
      ${senderTag}
      <div class="file-ic">📄</div>
      <div class="file-info"><b>${esc(m.fileName||'ملف')}</b><span>${fmtBytes(m.fileSize||0)}</span></div>
      ${deletedTag}${hiddenForTag}
    </div>`;
  }
  if(m.type==='call_invite'){
    return `<div class="bubble call-invite-bubble them">
      ${senderTag}
      <div class="call-invite-ic">📞</div>
      <div class="call-invite-text"><b>مكالمة صوتية</b><span>${esc(m.text||'تمت دعوتك إلى مكالمة صوتية.')}</span></div>
      <div class="meta">${fmtTime(m.ts)}</div>
      ${deletedTag}${hiddenForTag}
    </div>`;
  }
  return `<div class="bubble them">${senderTag}${esc(m.text||'')}<div class="meta">${fmtTime(m.ts)}</div>${deletedTag}${hiddenForTag}</div>`;
}

async function bindAdminSettingsEvents(){
  // حالة الصيانة الحالية
  try{
    const snap = await db.ref('siteConfig/maintenance').get();
    const m = snap.val() || {enabled:false, message:''};
    const line = $('#maintStatusLine');
    if(line) line.innerHTML = m.enabled
      ? `<span class="chip danger">مفعّل حاليًا ⚠️</span> — كل المستخدمين (عدا الأدمن) بيشوفوا شاشة الصيانة`
      : `<span class="chip ok">غير مفعّل</span> — المنصة شغالة بشكل طبيعي`;
    if($('#maintMsgInput')) $('#maintMsgInput').value = m.message || '';
  }catch(e){ /* تجاهل، الأزرار هتفضل شغالة برضو */ }

  $('#btnEnableMaint')?.addEventListener('click', async ()=>{
    const msg = $('#maintMsgInput').value.trim();
    try{
      await db.ref('siteConfig/maintenance').set({ enabled:true, message: msg || 'المنصة متوقفة مؤقتًا لتحديثات ضرورية، برجاء المحاولة لاحقًا', updatedAt: firebase.database.ServerValue.TIMESTAMP });
      logAdminAction('maintenance_enabled', msg);
      toast('تم تفعيل وضع الصيانة');
      bindAdminSettingsEvents();
    }catch(e){ toast('تعذر التفعيل: '+(e.message||'')); }
  });
  $('#btnDisableMaint')?.addEventListener('click', async ()=>{
    try{
      await db.ref('siteConfig/maintenance').update({ enabled:false, updatedAt: firebase.database.ServerValue.TIMESTAMP });
      logAdminAction('maintenance_disabled', '');
      toast('تم إيقاف وضع الصيانة');
      bindAdminSettingsEvents();
    }catch(e){ toast('تعذر الإيقاف: '+(e.message||'')); }
  });

  $('#btnSendBcast')?.addEventListener('click', async ()=>{
    const text = $('#bcastText').value.trim();
    const target = $('#bcastTarget').value;
    if(!text){ toast('اكتب نص الإشعار أولاً'); return; }
    const btn = $('#btnSendBcast'); btn.disabled = true;
    try{
      await db.ref('broadcastNotifications').push({ text, target, byUid: state.user.uid, byName: state.profile?.name||'الإدارة', ts: firebase.database.ServerValue.TIMESTAMP });
      logAdminAction('broadcast_notification', target+': '+text.slice(0,80));
      $('#bcastText').value = '';
      toast('تم إرسال الإشعار');
    }catch(e){ toast('تعذر الإرسال: '+(e.message||'')); }
    finally{ if(btn) btn.disabled=false; }
  });

  $('#btnSendDirectNotif')?.addEventListener('click', async ()=>{
    const uname = $('#directNotifUsername').value.trim().toLowerCase().replace(/[^a-z0-9_.]/g,'');
    const text = $('#directNotifText').value.trim();
    if(!uname || !text){ toast('أكمل اسم المستخدم ونص الرسالة'); return; }
    const btn = $('#btnSendDirectNotif'); btn.disabled = true;
    try{
      const unameSnap = await db.ref('usernames/'+uname).get();
      const targetUid = unameSnap.val();
      if(!targetUid){ toast('اسم المستخدم ده مش موجود'); return; }
      await db.ref('notifications/'+targetUid).push({ type:'admin', text, fromUid: state.user.uid, fromName: state.profile?.name||'الإدارة', ts: firebase.database.ServerValue.TIMESTAMP, read:false });
      logAdminAction('direct_notification', uname+': '+text.slice(0,80));
      $('#directNotifText').value = '';
      toast('تم إرسال الرسالة');
    }catch(e){ toast('تعذر الإرسال: '+(e.message||'')); }
    finally{ if(btn) btn.disabled=false; }
  });
}

const WEEKDAY_NAMES_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
// عيب قديم (مُصلَح): كان مسموح بميعاد واحد بس لكل طالب (يوم + ساعة واحدة)، فمعلمة
// عندها أكتر من حلقة أسبوعيًا مع نفس الطالب (مثلاً 3 أيام في الأسبوع) مكانش
// بيتسجّلش. دلوقتي كل طالب ممكن يكون ليه أي عدد من المواعيد (sessions/{id}:{day,time})
// بدل ميعاد واحد ثابت. بنفضل نقرأ الصيغة القديمة (day/time مباشرة) للتوافق مع
// أي بيانات قديمة موجودة فعلاً في القاعدة، وأول ما المعلمة تضيف ميعاد جديد
// بنرحّل القديم تلقائيًا لجوه sessions/ بدل ما يضيع.
function getStudentSessions(sc){
  if(!sc) return [];
  const out = [];
  if(sc.sessions){
    Object.entries(sc.sessions).forEach(([id,s])=>{ if(s && s.time!=null && s.day!=null) out.push({id, day:s.day, time:s.time}); });
  }
  if(sc.day!=null && sc.time && !sc.sessions){ out.push({id:'legacy', day:sc.day, time:sc.time}); }
  return out;
}
async function openScheduleModal(sid, name){

function renderScheduleModal(sid, name, sc, isInitial){
  const sessions = getStudentSessions(sc).sort((a,b)=> a.day-b.day || (a.time||'').localeCompare(b.time||''));
  const rows = sessions.length ? sessions.map(s=>`
    <div class="list-item" data-session-row="${esc(s.id)}">
      <div class="li-body"><b>${WEEKDAY_NAMES_AR[s.day]}</b><span>الساعة ${esc(s.time)}</span></div>
      <button class="btn sm danger" data-remove-session="${esc(s.id)}">حذف</button>
    </div>`).join('') : '<div class="empty-state">لسه معملتش أي ميعاد لحد دلوقتي</div>';
  const html = `
    <h3>مواعيد حلقة ${esc(name)}</h3>
    <div id="scheduleSessionsList" style="margin-bottom:16px">${rows}</div>
    <div class="section-title" style="margin-top:0">إضافة ميعاد جديد</div>
    <div class="field"><label>يوم الأسبوع</label>
      <select id="scheduleDay">${WEEKDAY_NAMES_AR.map((d,i)=>`<option value="${i}">${d}</option>`).join('')}</select>
    </div>
    <div class="field"><label>الساعة</label><input type="time" id="scheduleTime" value="16:00"></div>
    <button class="btn" id="btnAddSession">+ إضافة الميعاد</button>`;
  if(isInitial) showModal(html); else updateModalContent(html);
  $('#btnAddSession').addEventListener('click', async ()=>{
    const day = parseInt($('#scheduleDay').value, 10);
    const time = $('#scheduleTime').value;
    if(!time) return;
    const btn = $('#btnAddSession'); btn.disabled = true;
    try{
      const base = 'schedules/'+state.user.uid+'/'+sid;
      const updates = {}; updates[base+'/studentName'] = name;
      // ترحيل الميعاد القديم (لو موجود بالصيغة القديمة ولسه ماترحّلش) قبل إضافة أي ميعاد جديد
      if(sc.day!=null && sc.time && !sc.sessions){
        const legacyKey = db.ref(base+'/sessions').push().key;
        updates[base+'/sessions/'+legacyKey] = { day: sc.day, time: sc.time };
        updates[base+'/day'] = null; updates[base+'/time'] = null;
      }
      const newKey = db.ref(base+'/sessions').push().key;
      updates[base+'/sessions/'+newKey] = { day, time };
      await db.ref().update(updates);
      toast('تم إضافة الميعاد');
      const freshSnap = await db.ref(base).get();
      sc = freshSnap.val()||{};
      renderScheduleModal(sid, name, sc, false);
      if(teacherView==='profile') loadTeacherStudentProfile();
      if(teacherView==='students') loadTodaySchedule();
    }catch(e){ toast('تعذر الحفظ: '+(e.message||'')); }
    finally{ if(btn) btn.disabled=false; }
  });
  $all('[data-remove-session]').forEach(rBtn=>{
    rBtn.addEventListener('click', async ()=>{
      const sessId = rBtn.dataset.removeSession;
      const base = 'schedules/'+state.user.uid+'/'+sid;
      try{
        if(sessId==='legacy'){ await db.ref(base).update({day:null, time:null}); }
        else{ await db.ref(base+'/sessions/'+sessId).remove(); }
        toast('تم حذف الميعاد');
        const freshSnap = await db.ref(base).get();
        sc = freshSnap.val()||{};
        renderScheduleModal(sid, name, sc, false);
        if(teacherView==='profile') loadTeacherStudentProfile();
        if(teacherView==='students') loadTodaySchedule();
      }catch(e){ toast('تعذر الحذف: '+(e.message||'')); }
    });
  });
}

/* =====[ SECTION: مواقيت الصلاة + الأذكار — إضافة تميّز المنصة كمنصة علم شرعي ]===== */
const PRAYER_METHOD = 5; // الهيئة المصرية العامة للمساحة
const PRAYER_NAMES_AR = { Fajr:'الفجر', Dhuhr:'الظهر', Asr:'العصر', Maghrib:'المغرب', Isha:'العشاء' };
const PRAYER_ORDER = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
function todayKeyDDMMYYYY(){
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}
function getUserCoords(){
  return new Promise(resolve=>{
    if(!navigator.geolocation){ resolve({lat:30.0444, lng:31.2357}); return; } // القاهرة كموقع افتراضي لو تعذر تحديد الموقع
    navigator.geolocation.getCurrentPosition(
      pos=> resolve({lat:pos.coords.latitude, lng:pos.coords.longitude}),
      ()=> resolve({lat:30.0444, lng:31.2357}),
      {timeout:5000}
    );
  });
}
async function getPrayerTimes(){
  const cacheKey = 'rw_prayer_' + todayKeyDDMMYYYY();
  const cached = localStorage.getItem(cacheKey);
  if(cached){ try{ return JSON.parse(cached); }catch(_){} }
  const {lat,lng} = await getUserCoords();
  const res = await fetch(`https://api.aladhan.com/v1/timings/${todayKeyDDMMYYYY()}?latitude=${lat}&longitude=${lng}&method=${PRAYER_METHOD}`);
  if(!res.ok) throw new Error('prayer-fetch-failed');
  const data = await res.json();
  const timings = {};
  PRAYER_ORDER.forEach(k=>{ timings[k] = (data.data.timings[k]||'').split(' ')[0]; });
  localStorage.setItem(cacheKey, JSON.stringify(timings));
  return timings;
}
function computeNextPrayer(timings){
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  let next = null, nextMin = Infinity;
  PRAYER_ORDER.forEach(k=>{
    const [h,m] = (timings[k]||'0:0').split(':').map(Number);
    const mins = h*60+m;
    if(mins > nowMin && mins < nextMin){ nextMin = mins; next = k; }
  });
  if(!next){ // كل صلوات اليوم عدّت — القادمة فجر بكرة
    const [h,m] = (timings.Fajr||'0:0').split(':').map(Number);
    next = 'Fajr'; nextMin = h*60+m+24*60;
  }
  return { next, diffMin: nextMin - nowMin };
}
function renderPrayerWidgetHtml(){
  return `<div class="prayer-widget" id="prayerWidget"><div class="prayer-widget-top"><div class="prayer-widget-next"><b>جارِ تحميل المواقيت...</b><span>مواقيت الصلاة</span></div></div></div>`;
}
let prayerWidgetInterval = null;
async function loadPrayerWidget(){
  if(prayerWidgetInterval){ clearInterval(prayerWidgetInterval); prayerWidgetInterval=null; }
  try{
    const timings = await getPrayerTimes();
    const paint = ()=>{
      const box = $('#prayerWidget');
      if(!box){ clearInterval(prayerWidgetInterval); prayerWidgetInterval=null; return; }
      const {next, diffMin} = computeNextPrayer(timings);
      const h = Math.floor(diffMin/60), m = diffMin%60;
      box.innerHTML = `
        <div class="prayer-widget-top">
          <div class="prayer-widget-next"><b>${PRAYER_NAMES_AR[next]}</b><span>الصلاة القادمة بعد</span></div>
          <div class="prayer-widget-countdown">${h>0?h+'س ':''}${m}د</div>
        </div>
        <div class="prayer-widget-list">${PRAYER_ORDER.map(k=>`<div class="${k===next?'next-p':''}">${PRAYER_NAMES_AR[k]}<b>${timings[k]||'—'}</b></div>`).join('')}</div>`;
    };
    paint();
    prayerWidgetInterval = setInterval(paint, 30000);
  }catch(e){
    const box = $('#prayerWidget');
    if(box) box.innerHTML = `<div class="prayer-widget-top"><div class="prayer-widget-next"><b>تعذر تحميل المواقيت</b><span>تأكد من الاتصال بالإنترنت</span></div></div>`;
  }
}
// أذكار الصباح والمساء — نصوص تراثية إسلامية موثقة من كتب الأذكار المعروفة (حصن المسلم)
const ADHKAR_MORNING = [

let adhkarTab = 'morning';
let adhkarCounts = {};
function openAdhkarModal(){ adhkarTab='morning'; adhkarCounts={}; renderAdhkarModal(); }
function renderAdhkarModal(){
  const list = adhkarTab==='morning' ? ADHKAR_MORNING : ADHKAR_EVENING;
  showModal(`
    <h3>📿 الأذكار</h3>
    <div class="adhkar-tabs">
      <button data-tab="morning" class="${adhkarTab==='morning'?'active':''}">أذكار الصباح</button>
      <button data-tab="evening" class="${adhkarTab==='evening'?'active':''}">أذكار المساء</button>
    </div>
    <div id="adhkarList">${list.map((a,i)=>renderAdhkarItem(i,a)).join('')}</div>`);
  $all('[data-tab]').forEach(b=> b.addEventListener('click', ()=>{ adhkarTab=b.dataset.tab; adhkarCounts={}; renderAdhkarModal(); }));
  bindAdhkarItemEvents();
}
function renderAdhkarItem(i, a){
  const remaining = a.c - (adhkarCounts[i]||0);
  const done = remaining<=0;
  return `<div class="adhkar-item ${done?'done':''}"><p>${esc(a.t)}</p><button class="adhkar-count-btn" data-tap="${i}" ${done?'disabled':''}>${done?'✓':remaining}</button></div>`;
}
function bindAdhkarItemEvents(){
  $all('[data-tap]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const i = btn.dataset.tap;
      const list = adhkarTab==='morning' ? ADHKAR_MORNING : ADHKAR_EVENING;
      adhkarCounts[i] = (adhkarCounts[i]||0)+1;
      const remaining = list[i].c - adhkarCounts[i];
      if(remaining<=0){ btn.closest('.adhkar-item').classList.add('done'); btn.textContent='✓'; btn.disabled=true; }
      else btn.textContent = remaining;
    });
  });
}
// تتابع أيام الحفظ (Streak) — بيتحسب من عدد الأيام المتتالية اللي فيها سجل إنجاز
function computeStreak(logsObj){
  const days = new Set();
  Object.values(logsObj||{}).forEach(l=>{ if(l.ts){ const d=new Date(l.ts); days.add(d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate()); } });
  let streak = 0;
  const cursor = new Date();
  while(days.has(cursor.getFullYear()+'-'+cursor.getMonth()+'-'+cursor.getDate())){
    streak++; cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

function openRatingModal(teacherUid){
  let stars = 0;
  showModal(`
    <h3>قيّمي معلمتك</h3>
    <div class="stars" id="starsPick">${[1,2,3,4,5].map(i=>`<span data-s="${i}">★</span>`).join('')}</div>
    <div class="field"><label>ملاحظة (اختياري)</label><textarea id="rateNote" placeholder="اكتب رأيك"></textarea></div>
    <button class="btn" id="btnSubmitRating">إرسال التقييم</button>`);
  $all('#starsPick span').forEach(s=>s.addEventListener('click', ()=>{
    stars = parseInt(s.dataset.s);
    $all('#starsPick span').forEach(x=>x.classList.toggle('filled', parseInt(x.dataset.s)<=stars));
  }));
  $('#btnSubmitRating').addEventListener('click', async ()=>{
    if(!stars){ toast('اختر عدد النجوم'); return; }
    await db.ref('ratings/'+teacherUid+'/'+state.user.uid).push({ stars, note: $('#rateNote').value.trim()||null, ts: firebase.database.ServerValue.TIMESTAMP });
    // تحديث متوسط التقييم الإجمالي للمعلمة (sum/count) بعملية transaction ذرّية —
    // بدل ما كل حد يحسب المتوسط بنفسه من قراءة شجرة ratings كاملة (اللي أصلاً محدش
    // غير الأدمن أو المعلمة نفسها يقدر يقراها)، بنخزن رقمين خفيفين أي حد يقدر يقراهم.
    try{
      await db.ref('ratingsSummary/'+teacherUid).transaction(cur=>{
        const c = cur || {sum:0, count:0};
        return { sum: (c.sum||0) + stars, count: (c.count||0) + 1 };
      });
    }catch(_){ /* المتوسط تحسين عرض إضافي فقط — مايوقفش تسجيل التقييم الأساسي لو فشل */ }
    hideModal(); toast('شكرًا لتقييمك ⭐');
  });
}

function teardownChat(){
  if(state.msgsRef){ state.msgsRef.off(); state.msgsRef=null; }
  if(state.chatPresenceRef){ state.chatPresenceRef.off(); state.chatPresenceRef=null; }
  if(state.chatTypingRef){ state.chatTypingRef.off(); state.chatTypingRef=null; }
  if(state.chatPinnedRef){ state.chatPinnedRef.off(); state.chatPinnedRef=null; }
  if(state.myTypingRef){ try{ state.myTypingRef.onDisconnect().cancel(); state.myTypingRef.remove(); }catch(_){} state.myTypingRef=null; }
  if(state.typingTimeout){ clearTimeout(state.typingTimeout); state.typingTimeout=null; }
  state.replyTo = null;
  state.chatUserIsNearBottom = true;
  state.chatUnseenWhileUp = 0;
  (state.pendingAttachments||[]).forEach(a=>{ if(a.previewUrl) URL.revokeObjectURL(a.previewUrl); });
  state.pendingAttachments = [];
  cancelVoiceRecording(); // لو المستخدم خرج من الشات وهو لسه بيسجل صوت، نلغي التسجيل وننظف المايك

function bindChatEvents(){

      .filter(([id,m])=> !(m.deletedFor && m.deletedFor[myUid]))
      .sort((a,b)=>(a[1].ts||0)-(b[1].ts||0));
    state.chatMsgsCache = msgs;
    const lastEntry = entries[entries.length-1];
    const lastIsMine = lastEntry && lastEntry[1].senderUid===myUid;
    const isNewLast = lastEntry && lastEntry[0] !== state.chatLastRenderedLastId;
    const wasNearBottom = state.chatUserIsNearBottom;

      if(isNewLast && !lastIsMine){

/* ====== البحث داخل المحادثة — بيدور في الرسائل النصية المحمّلة حاليًا في الشات ====== */
let chatSearchHits = [];
let chatSearchActiveIdx = -1;
function closeChatSearch(){
  $all('.bubble.search-hit, .bubble.search-hit-active', $('#chatBody')).forEach(el=>el.classList.remove('search-hit','search-hit-active'));
  chatSearchHits = []; chatSearchActiveIdx = -1;
  const inp = $('#chatSearchInput'); if(inp) inp.value='';
  const cnt = $('#chatSearchCount'); if(cnt) cnt.textContent='';
}
function runChatSearch(term){
  const body = $('#chatBody');
  $all('.bubble.search-hit, .bubble.search-hit-active', body).forEach(el=>el.classList.remove('search-hit','search-hit-active'));
  term = (term||'').trim();
  if(!term){ chatSearchHits=[]; chatSearchActiveIdx=-1; $('#chatSearchCount').textContent=''; return; }
  const cache = state.chatMsgsCache || {};
  chatSearchHits = Object.entries(cache)
    .filter(([,m])=> m.type==='text' && !m.deleted && (m.text||'').toLowerCase().includes(term.toLowerCase()))
    .map(([id])=>id);
  chatSearchHits.forEach(id=>{ const el = body.querySelector(`.bubble[data-msg-id="${id}"]`); if(el) el.classList.add('search-hit'); });
  $('#chatSearchCount').textContent = chatSearchHits.length ? `${chatSearchHits.length} نتيجة` : 'لا نتائج';
  chatSearchActiveIdx = -1;
  if(chatSearchHits.length) jumpToNextSearchHit();
}
function jumpToNextSearchHit(){
  if(!chatSearchHits.length) return;
  const body = $('#chatBody');
  const prevEl = chatSearchActiveIdx>=0 ? body.querySelector(`.bubble[data-msg-id="${chatSearchHits[chatSearchActiveIdx]}"]`) : null;
  if(prevEl){ prevEl.classList.remove('search-hit-active'); prevEl.classList.add('search-hit'); }
  chatSearchActiveIdx = (chatSearchActiveIdx + 1) % chatSearchHits.length;
  const el = body.querySelector(`.bubble[data-msg-id="${chatSearchHits[chatSearchActiveIdx]}"]`);
  if(el){
    el.classList.remove('search-hit'); el.classList.add('search-hit-active');
    el.scrollIntoView({behavior:'smooth', block:'center'});
    $('#chatSearchCount').textContent = `${chatSearchActiveIdx+1} / ${chatSearchHits.length}`;
  }
}
function setReplyTo(msgId, m){
  if(!msgId){ state.replyTo = null; $('#replyPreviewBar').style.display='none'; return; }
  const mine = m.senderUid===state.user.uid;

  state.replyTo = { msgId, preview, senderUid: m.senderUid };

function msgPreviewText(m){
  if(m.type==='text') return m.text;

  if(m.type==='audio') return '🎤 رسالة صوتية';
  if(m.type==='call_invite') return '📞 دعوة مكالمة صوتية';

function renderChatBubble(id, m){
  const mine = m.senderUid===state.user.uid;
  const tick = mine ? (' '+(m.read?'✓✓':'✓')) : '';
  const editedTag = m.edited ? `<span class="edited-tag">(تم التعديل)</span>` : '';
  const quoted = (m.replyTo && !m.deleted) ? `<div class="quoted-reply"><b>${m.replyTo.senderUid===state.user.uid?'أنت':esc(state.chatWith.name)}</b>${esc(m.replyTo.preview||'')}</div>` : '';
  const fwdTag = m.forwarded ? `<div class="edited-tag" style="display:block;margin-bottom:4px">↪️ رسالة موجّهة</div>` : '';
  // كل رسالة بتاخد data-msg-id/data-mine عشان الضغط المطوّل يقدر يحذفها (زي الواتس)
  if(m.deleted){
    return `<div class="bubble ${mine?'me':'them'} deleted-bubble" data-msg-id="${id}" data-mine="${mine?'1':'0'}">
      <span class="deleted-icon">🚫</span> تم حذف هذه الرسالة
      <div class="meta">${fmtTime(m.ts)}</div>
    </div>`;
  }
  if(m.type==='image'){
    return `<div class="bubble media ${mine?'me':'them'}" data-msg-id="${id}" data-mine="${mine?'1':'0'}">
      ${fwdTag}${quoted}
      <div class="chat-img-wrap">
        <img class="chat-img" src="${esc(m.url)}" data-full="${esc(m.url)}" loading="lazy">
        <div class="meta">${fmtTime(m.ts)}${tick}</div>
      </div>
    </div>`;
  }
  if(m.type==='audio'){
    const dur = m.duration ? (String(Math.floor(m.duration/60)).padStart(2,'0')+':'+String(m.duration%60).padStart(2,'0')) : '';
    return `<div class="bubble audio-bubble ${mine?'me':'them'}" data-msg-id="${id}" data-mine="${mine?'1':'0'}">
      ${fwdTag}${quoted}
      🎤 <audio controls preload="none" src="${esc(m.url)}"></audio>
      <div class="meta">${dur?dur+' · ':''}${fmtTime(m.ts)}${tick}</div>
    </div>`;
  }
  if(m.type==='file'){
    return `<div class="bubble file-bubble ${mine?'me':'them'}" data-msg-id="${id}" data-mine="${mine?'1':'0'}">
      ${fwdTag}${quoted}
      <div class="file-ic">📄</div>
      <div class="file-info"><b>${esc(m.fileName||'ملف')}</b><span>${fmtBytes(m.fileSize)}</span></div>
      <a class="file-dl" href="${esc(m.url)}" target="_blank" rel="noopener" download>⬇️</a>
    </div>`;
  }
  if(m.type==='call_invite'){
    // فقاعة دعوة مكالمة: تظهر عند الطرفين، وزر الانضمام يشتغل فقط طالما الغرفة لسه مفتوحة
    return `<div class="bubble call-invite-bubble ${mine?'me':'them'}" data-msg-id="${id}" data-mine="${mine?'1':'0'}">
      ${fwdTag}
      <div class="call-invite-ic">📞</div>
      <div class="call-invite-text"><b>مكالمة صوتية</b><span>${esc(m.text||'تمت دعوتك إلى مكالمة صوتية.')}</span></div>
      <button class="btn call-invite-join-btn" data-call-id="${esc(m.callId)}">📞 الانضمام للمكالمة</button>
      <div class="meta">${fmtTime(m.ts)}${tick}</div>
    </div>`;
  }
  return `<div class="bubble ${mine?'me':'them'}" data-msg-id="${id}" data-mine="${mine?'1':'0'}">${fwdTag}${quoted}${esc(m.text)}<div class="meta">${editedTag}${fmtTime(m.ts)}${tick}</div></div>`;
}
async function sendChatMessage(){
  const input = $('#chatInput'); const text = input.value.trim();
  if(!text) return;
  const o = state.chatWith; const chatId = pairId(state.user.uid, o.uid);
  input.value='';
  const payload = { senderUid: state.user.uid, type:'text', text, ts: firebase.database.ServerValue.TIMESTAMP, read:false };
  if(state.replyTo){ payload.replyTo = { msgId: state.replyTo.msgId, preview: state.replyTo.preview, senderUid: state.replyTo.senderUid }; }
  try{
    await db.ref('chatThreads/'+chatId+'/messages').push(payload);
    bumpMessagesCounter();
    pushMessageNotification(o.uid, text);
    setReplyTo(null);
    if(state.myTypingRef) state.myTypingRef.remove();
    if(state.typingTimeout){ clearTimeout(state.typingTimeout); state.typingTimeout=null; }
  }catch(e){ toast('تعذر إرسال الرسالة'); }
}

function bindMessageLongPress(chatId){
  const body = $('#chatBody');
  if(!body || body._longPressBound) return; // نمنع تكرار ربط المستمعين لما الشات يتفتح أكتر من مرة
  body._longPressBound = true;
  const LONG_PRESS_MS = 450, MOVE_TOLERANCE = 10;
  let pressTimer = null, startX = 0, startY = 0, targetBubble = null;
  const clearPress = ()=>{ if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; } targetBubble = null; };
  const startPress = (bubble, x, y)=>{
    targetBubble = bubble; startX = x; startY = y;
    pressTimer = setTimeout(()=>{
      if(targetBubble){ openMsgActionSheet(chatId, targetBubble.dataset.msgId, targetBubble.dataset.mine==='1'); }
      clearPress();
    }, LONG_PRESS_MS);
  };
  body.addEventListener('touchstart', e=>{
    const bubble = e.target.closest('.bubble[data-msg-id]');
    if(!bubble) return;
    const t = e.touches[0];
    startPress(bubble, t.clientX, t.clientY);
  }, {passive:true});
  body.addEventListener('touchmove', e=>{
    if(!pressTimer) return;
    const t = e.touches[0];
    if(Math.abs(t.clientX-startX)>MOVE_TOLERANCE || Math.abs(t.clientY-startY)>MOVE_TOLERANCE) clearPress();
  }, {passive:true});
  body.addEventListener('touchend', clearPress);
  body.addEventListener('touchcancel', clearPress);
  // دعم الفأرة على الكمبيوتر: ضغط مطوّل بالزر الشمال + كليك يمين كاختصار مباشر
  body.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    const bubble = e.target.closest('.bubble[data-msg-id]');
    if(!bubble) return;
    startPress(bubble, e.clientX, e.clientY);
  });
  body.addEventListener('mousemove', e=>{
    if(!pressTimer) return;
    if(Math.abs(e.clientX-startX)>MOVE_TOLERANCE || Math.abs(e.clientY-startY)>MOVE_TOLERANCE) clearPress();
  });
  body.addEventListener('mouseup', clearPress);
  body.addEventListener('mouseleave', clearPress);
  body.addEventListener('contextmenu', e=>{
    const bubble = e.target.closest('.bubble[data-msg-id]');
    if(!bubble) return;
    e.preventDefault();
    clearPress();
    openMsgActionSheet(chatId, bubble.dataset.msgId, bubble.dataset.mine==='1');
  });
}
const EDIT_WINDOW_MS = 15*60*1000; // مدة السماح بتعديل الرسالة: 15 دقيقة من وقت الإرسال

  });
  $('#btnCancelDelMsg').addEventListener('click', ()=> hideModal());

async function openForwardPicker(m){

async function forwardMessageTo(targetUid, m){
  const chatId = pairId(state.user.uid, targetUid);
  const payload = { senderUid: state.user.uid, type: m.type, ts: firebase.database.ServerValue.TIMESTAMP, read:false, forwarded:true };
  if(m.type==='text') payload.text = m.text;
  else { payload.url = m.url; payload.fileName = m.fileName||null; payload.fileSize = m.fileSize||null; payload.mimeType = m.mimeType||null; if(m.duration) payload.duration = m.duration; }
  try{
    await db.ref('chatThreads/'+chatId+'/messages').push(payload);
    bumpMessagesCounter();
    pushMessageNotification(targetUid, msgPreviewText(m));
    hideModal();
    toast('تم توجيه الرسالة');
  }catch(e){ toast('تعذر توجيه الرسالة: '+(e.message||'')); }
}
function copyMessageText(text){
  if(!text) return;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=> toast('تم نسخ النص')).catch(()=> toast('تعذر النسخ'));
  }else{
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('تم نسخ النص'); }catch(_){ toast('تعذر النسخ'); }
    document.body.removeChild(ta);
  }
}
function openEditMessageModal(chatId, msgId, currentText){
  showModal(`
    <h3>تعديل الرسالة</h3>
    <div class="field"><textarea id="editMsgInput" rows="3">${esc(currentText)}</textarea></div>
    <button class="btn" id="btnSaveEditMsg" style="margin-top:10px">حفظ التعديل</button>
    <button class="btn secondary" id="btnCancelEditMsg" style="margin-top:8px">إلغاء</button>`);
  $('#btnSaveEditMsg').addEventListener('click', async ()=>{
    const val = $('#editMsgInput').value.trim();
    if(!val) return;
    try{
      await db.ref(`chatThreads/${chatId}/messages/${msgId}`).update({ text: val, edited: true, editedAt: firebase.database.ServerValue.TIMESTAMP });
      hideModal();
      toast('تم تعديل الرسالة');
    }catch(e){ toast('تعذر حفظ التعديل'); }
  });
  $('#btnCancelEditMsg').addEventListener('click', ()=> hideModal());
}
async function deleteMessage(chatId, msgId, forEveryone){
  try{
    if(forEveryone){
      // حذف لدى الجميع: بيعلّم على الرسالة "محذوفة" فبتظهر للطرفين كذلك، لكن المحتوى
      // الأصلي بيفضل موجود فعليًا في القاعدة (عشان الأدمن يقدر يشوفه في شاشة مراجعة
      // المحادثات — "حرف ميتحذفش" عند الأدمن حتى لو الطرفين حذفوه بينهم).
      await db.ref(`chatThreads/${chatId}/messages/${msgId}`).update({
        deleted: true, deletedAt: firebase.database.ServerValue.TIMESTAMP
      });
      // لو الرسالة المحذوفة كانت هي المثبّتة، نشيل التثبيت
      const pinSnap = await db.ref(`chatThreads/${chatId}/pinnedMsgId`).once('value');
      if(pinSnap.val()===msgId) db.ref(`chatThreads/${chatId}/pinnedMsgId`).remove();
    }else{
      // حذف عندي فقط: بيتفلتر من واجهتي بس، وتفضل الرسالة موجودة عند الطرف التاني والأدمن
      await db.ref(`chatThreads/${chatId}/messages/${msgId}/deletedFor/${state.user.uid}`).set(true);
    }
    hideModal();
    toast(forEveryone ? 'تم حذف الرسالة لدى الجميع' : 'تم حذف الرسالة عندك فقط');
  }catch(e){
    console.error(e);
    toast('تعذر حذف الرسالة: ' + (e.message||''));
  }
}
/* ====== ضغط الصور قبل الرفع — بيقلل حجم الصورة قبل ما تتبعت لسيرفر Cloudinary ====== */
function compressImageFile(file){
  return new Promise(resolve=>{
    if(!file.type.startsWith('image/') || file.type==='image/gif'){ resolve(file); return; } // GIF ميتضغطش عشان الحركة
    const objUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      const MAX_DIM = 1600;
      let {width, height} = img;
      if(width > MAX_DIM || height > MAX_DIM){
        const ratio = Math.min(MAX_DIM/width, MAX_DIM/height);
        width = Math.round(width*ratio); height = Math.round(height*ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob=>{
        URL.revokeObjectURL(objUrl);
        if(!blob || blob.size >= file.size){ resolve(file); return; } // لو الضغط زوّد الحجم، ابعت الأصلي
        resolve(new File([blob], file.name, {type:'image/jpeg'}));
      }, 'image/jpeg', 0.78);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(objUrl); resolve(file); };
    img.src = objUrl;
  });
}

/* ====== معاينة الملفات/الصور قبل الإرسال — بتسمح باختيار أكتر من ملف مرة واحدة ====== */
let attachIdCounter = 0;
function handleFilesSelected(files){
  files.forEach(file=>{
    if(file.size > MAX_CHAT_FILE_MB*1024*1024){ toast(`تم تجاهل "${file.name}" — أكبر من ${MAX_CHAT_FILE_MB}MB`); return; }
    const id = 'att' + (++attachIdCounter);
    const isImage = file.type.startsWith('image/');
    state.pendingAttachments.push({ id, file, isImage, previewUrl: isImage ? URL.createObjectURL(file) : null });
  });
  renderAttachPreview();
}
function renderAttachPreview(){
  const bar = $('#attachPreviewBar'); if(!bar) return;
  const list = state.pendingAttachments || [];
  if(!list.length){ bar.style.display='none'; return; }
  bar.style.display='flex';
  $('#attachCount').textContent = list.length;
  $('#attachPreviewList').innerHTML = list.map(a=>`
    <div class="attach-preview-item" data-id="${a.id}">
      ${a.isImage ? `<img src="${a.previewUrl}">` : `<span>📄</span>`}
      <span class="attach-preview-remove" data-remove="${a.id}">✕</span>
    </div>`).join('');
  $all('[data-remove]', $('#attachPreviewList')).forEach(el=>{
    el.addEventListener('click', ()=> removePendingAttachment(el.dataset.remove));
  });
}
function removePendingAttachment(id){
  const item = (state.pendingAttachments||[]).find(a=>a.id===id);
  if(item && item.previewUrl) URL.revokeObjectURL(item.previewUrl);
  state.pendingAttachments = (state.pendingAttachments||[]).filter(a=>a.id!==id);
  renderAttachPreview();
}
function clearPendingAttachments(){
  (state.pendingAttachments||[]).forEach(a=>{ if(a.previewUrl) URL.revokeObjectURL(a.previewUrl); });
  state.pendingAttachments = [];
  renderAttachPreview();
}
async function sendPendingAttachments(){
  const list = state.pendingAttachments || [];
  if(!list.length) return;
  state.pendingAttachments = [];
  renderAttachPreview();
  for(const a of list){
    if(a.previewUrl) URL.revokeObjectURL(a.previewUrl);
    await uploadChatFile(a.file); // بالتتابع عشان شريط التقدم يبان صح لكل ملف على حدة
  }
}
/* ====== تسجيل وإرسال الرسائل الصوتية ====== */
const MAX_VOICE_SECONDS = 180; // حد أقصى 3 دقائق للرسالة الصوتية الواحدة
let voiceRecorder = null, voiceChunks = [], voiceStream = null, voiceStartTs = 0, voiceTimerInt = null;
async function startVoiceRecording(){
  if(voiceRecorder) return; // فيه تسجيل شغال بالفعل
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){ toast('المتصفح ده مش بيدعم تسجيل الصوت'); return; }
  try{
    voiceStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  }catch(e){ toast('محتاجين إذن الميكروفون عشان تبعت رسالة صوتية'); return; }
  voiceChunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
  voiceRecorder = mimeType ? new MediaRecorder(voiceStream, {mimeType}) : new MediaRecorder(voiceStream);
  voiceRecorder.ondataavailable = e=>{ if(e.data && e.data.size>0) voiceChunks.push(e.data); };
  voiceRecorder.start();
  voiceStartTs = Date.now();
  $('#chatInputBar').style.display = 'none';
  $('#voiceRecordBar').style.display = 'flex';
  const paintTimer = ()=>{
    const secs = Math.floor((Date.now()-voiceStartTs)/1000);
    const el = $('#voiceRecordTimer');
    if(el) el.textContent = String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');
    if(secs >= MAX_VOICE_SECONDS) stopVoiceRecordingAndSend(); // إيقاف تلقائي عند الحد الأقصى
  };
  paintTimer();
  voiceTimerInt = setInterval(paintTimer, 500);
}
function stopVoiceTracksAndUI(){
  if(voiceTimerInt){ clearInterval(voiceTimerInt); voiceTimerInt=null; }
  if(voiceStream){ voiceStream.getTracks().forEach(t=>t.stop()); voiceStream=null; }
  const bar = $('#voiceRecordBar'), inputBar = $('#chatInputBar');
  if(bar) bar.style.display='none';
  if(inputBar) inputBar.style.display='flex';
  voiceRecorder = null;
}
function cancelVoiceRecording(){
  if(!voiceRecorder){ stopVoiceTracksAndUI(); return; }
  try{ voiceRecorder.stop(); }catch(_){}
  voiceChunks = [];
  stopVoiceTracksAndUI();
}
function stopVoiceRecordingAndSend(){
  if(!voiceRecorder || voiceRecorder.state!=='recording') return; // منع استدعاء stop() مرتين لو المستخدم دبل على زرار الإرسال بسرعة
  const durationSec = Math.round((Date.now()-voiceStartTs)/1000);
  const mimeType = voiceRecorder.mimeType || 'audio/webm';
  voiceRecorder.onstop = ()=>{
    const blob = new Blob(voiceChunks, {type: mimeType});
    voiceChunks = [];
    stopVoiceTracksAndUI();
    if(blob.size < 500){ toast('التسجيل قصير جدًا'); return; } // تجاهل تسجيلات فارغة بالغلط
    const ext = mimeType.includes('mp4') ? 'm4a' : 'webm';
    const file = new File([blob], `voice-${Date.now()}.${ext}`, {type: mimeType});
    uploadChatFile(file, { duration: durationSec });
  };
  try{ voiceRecorder.stop(); }catch(_){ stopVoiceTracksAndUI(); }
}
const MAX_CHAT_FILE_MB = 15;
async function uploadChatFile(file, opts){
  opts = opts || {};
  const o = state.chatWith; if(!o) return;
  if(file.size > MAX_CHAT_FILE_MB*1024*1024){ toast(`الملف كبير جدًا (الحد الأقصى ${MAX_CHAT_FILE_MB}MB)`); return; }
  if(CLOUDINARY_CLOUD_NAME==='YOUR_CLOUD_NAME' || CLOUDINARY_UPLOAD_PRESET==='YOUR_UNSIGNED_PRESET'){
    toast('لسه محتاج تظبط إعدادات Cloudinary في أعلى الكود (CLOUDINARY_CLOUD_NAME/CLOUDINARY_UPLOAD_PRESET)');
    return;
  }
  const isImage = file.type.startsWith('image/');
  const isAudio = file.type.startsWith('audio/');
  if(isImage) file = await compressImageFile(file); // تصغير الصورة قبل الرفع لتوفير الوقت والباقة
  const chatId = pairId(state.user.uid, o.uid);
  const wrap = $('#uploadProgressWrap'), fill = $('#uploadProgressFill');
  if(wrap) wrap.style.display='block';
  try{
    // "auto" بتخلي Cloudinary يكتشف نوع الملف بنفسه (صورة/فيديو/صوت/ملف عادي زي pdf أو docx أو zip)
    const url = await new Promise((resolve, reject)=>{
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`);
      xhr.upload.onprogress = (e)=>{
        if(e.lengthComputable && fill){ fill.style.width = Math.round((e.loaded/e.total)*100)+'%'; }
      };
      xhr.onload = ()=>{
        try{
          const res = JSON.parse(xhr.responseText);
          if(xhr.status>=200 && xhr.status<300 && res.secure_url) resolve(res.secure_url);
          else reject(new Error(res.error?.message || 'فشل الرفع'));
        }catch(err){ reject(err); }
      };
      xhr.onerror = ()=>reject(new Error('تعذر الاتصال بالسيرفر'));
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      fd.append('folder', 'chatFiles/'+chatId);
      xhr.send(fd);
    });
    const msgType = isImage ? 'image' : (isAudio ? 'audio' : 'file');
    const payload = {
      senderUid: state.user.uid, type: msgType, url,
      fileName: file.name, fileSize: file.size, mimeType: file.type||null,
      ts: firebase.database.ServerValue.TIMESTAMP, read:false
    };
    if(isAudio && opts.duration) payload.duration = opts.duration;
    await db.ref('chatThreads/'+chatId+'/messages').push(payload);
    bumpMessagesCounter();
    pushMessageNotification(o.uid, msgPreviewText(payload));
  }catch(e){
    console.error(e);
    toast('تعذر رفع الملف: ' + (e.message||''));
  } finally {
    if(wrap){ wrap.style.display='none'; if(fill) fill.style.width='0%'; }
  }
}

/* =====[ SECTION: CALLS (WebRTC) — نظام غرفة الاتصال (المعلمة تُنشئ / الطالبة تُدعى) ]=====
   منطق إدارة الغرفة (إنشاء/دعوة/انضمام/إنهاء) عبر Firebase زي ما هو تمامًا من غير أي تغيير.
   المعلمة هي الوحيدة اللي تقدر "تُنشئ" غرفة، وبعدين تبعت دعوة داخل نفس الشات، والطالبة
   تنضم بضغطة واحدة من غير ما تكتب أي كود يدويًا. منطق الصوت نفسه (تحت) بقى WebRTC أصلي
   + TURN مجاني بدل Agora. */
// كود عرض قصير فقط (للتوثيق البصري داخل الكارد) — الطالبة لا تحتاج تكتبه أبدًا، الانضمام بالكامل تلقائي عبر زر الدعوة
function callDisplayCode(callId){
  return String(callId).replace(/[^a-zA-Z0-9]/g,'').slice(-8).toUpperCase();
}
// اسم قناة Agora لازم ميتعديش 64 بايت — و callId عبارة عن يوزر آيديز فايربيز مضمومة لبعض (28 حرف لكل واحد)،
// فبيطلع أطول من 64 بايت و Agora بيرفضه (وده كان سبب "تعذر الدخول على المكالمة" اللي بيحصل كل مرة).
// الحل: نحوّل الـ callId لهاش قصير وثابت (نفس المدخل بيدي نفس الناتج دايمًا) ونستخدمه كاسم قناة بدل الأصلي.
function shortChannelId(callId){
  let h1=0, h2=0; const s=String(callId);
  for(let i=0;i<s.length;i++){
    const c=s.charCodeAt(i);
    h1=(Math.imul(31,h1)+c)|0;
    h2=(Math.imul(131,h2)+c)|0;
  }
  return 'c_'+(h1>>>0).toString(36)+(h2>>>0).toString(36);
}

/* =====[ الشيت السفلي عند الضغط على زر الاتصال داخل الشات ]===== */
function teardownCallSheetWatcher(){
  if(state._callSheetWatcher){
    state._callSheetWatcher.ref.off('value', state._callSheetWatcher.cb);
    state._callSheetWatcher = null;
  }
  state._callSheetCtx = null;
}
function openCallSheet(otherUid, otherName){
  // منع فتح الشيت وانت أصلاً جوه مكالمة شغالة فعليًا
  if(state.currentCallId){ toast('انت بالفعل في مكالمة، أنهِها الأول'); return; }
  teardownCallSheetWatcher(); // تنظيف أي مستمع شيت قديم متبقٍّ قبل ما نفتح واحد جديد
  const myUid = state.user.uid;
  const isTeacher = state.profile.role==='teacher';
  const callId = pairId(myUid, otherUid);
  const ctx = {
    callId, teacherId: isTeacher?myUid:otherUid, studentId: isTeacher?otherUid:myUid,
    otherUid, otherName, isTeacher, teacherName: isTeacher?(state.profile.name||'المعلمة'):otherName
  };
  state._callSheetCtx = ctx;
  showModal(callSheetSkeletonHtml());
  bindCallSheetActions();
  const ref = db.ref('calls/'+callId);
  const cb = snap=> updateModalContent(renderCallSheetBody(snap.val(), ctx));
  ref.on('value', cb);
  state._callSheetWatcher = {ref, cb};
}

      <div class="call-sheet-icon" style="background:rgba(47,125,94,0.15)">✅</div>
      <b style="display:block;margin-bottom:14px">تم استلام دعوة الاتصال</b>
      <button class="btn" id="btnJoinInvitedCall">✅ الانضمام للمكالمة</button>
    </div>`;
