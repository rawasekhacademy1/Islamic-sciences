<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>رواسخ أكاديمية</title>

<!-- ============================================================
     رواسخ أكاديمية
     ملف واحد شامل: HTML + CSS + JS (بنفس فلسفة "نافورة")
     الأقسام مقسّمة بعلامات =====[ SECTION ]===== لتسهيل التعديل الجراحي لاحقًا
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase (compat SDK — أسهل في ملف واحد بدون build step) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

<style>
/* =====[ SECTION: DESIGN TOKENS ]===== */
:root{
  /* لوحة الألوان — أخضر زمردي غامق / ذهبي / كريمي */
  --emerald-950:#07231a;
  --emerald-900:#0c3327;
  --emerald-800:#123f30;
  --emerald-700:#1a5240;
  --emerald-600:#236b55;
  --gold-500:#c9a227;
  --gold-400:#dab84a;
  --gold-300:#e8cd7a;
  --cream-50:#faf6ec;
  --cream-100:#f3ecda;
  --cream-200:#e8dcc0;
  --ink-900:#1b241f;
  --ink-600:#4c5850;
  --danger:#b3423a;
  --success:#2f7d5e;
  --warn:#c9822a;

  --bg:var(--cream-50);
  --surface:#ffffff;
  --surface-2:var(--cream-100);
  --text:var(--ink-900);
  --text-dim:var(--ink-600);
  --border:rgba(27,36,31,0.10);
  --accent:var(--emerald-800);
  --accent-2:var(--gold-500);
  --shadow:0 10px 30px -12px rgba(11,41,31,0.25);
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:10px;
  --font-display:'Amiri', serif;
  --font-body:'Cairo', sans-serif;
}
[data-theme="dark"]{
  --bg:var(--emerald-950);
  --surface:#0e2b21;
  --surface-2:#123527;
  --text:#f2ead2;
  --text-dim:#a9baaf;
  --border:rgba(242,234,210,0.10);
  --accent:var(--gold-400);
  --accent-2:var(--gold-300);
  --shadow:0 10px 34px -12px rgba(0,0,0,0.55);
}

*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; background:var(--bg); color:var(--text);
  font-family:var(--font-body); direction:rtl; overflow-x:hidden;
  transition:background .35s ease, color .35s ease;
}
h1,h2,h3,.display{font-family:var(--font-display);}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
a{color:inherit; text-decoration:none;}
::selection{background:var(--accent-2); color:var(--emerald-950);}

/* شريط تمرير هادئ */
::-webkit-scrollbar{width:6px; height:6px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px;}

/* =====[ SECTION: ZIER (SIGNATURE MOTIF) — سبحة رقمية كمؤشر تقدّم ]===== */
.tasbih{display:flex; align-items:center; gap:4px; direction:ltr;}
.tasbih .bead{width:9px; height:9px; border-radius:50%; background:var(--border); transition:all .4s ease;}
.tasbih .bead.filled{background:linear-gradient(160deg,var(--gold-400),var(--gold-500)); box-shadow:0 0 0 3px rgba(201,162,39,0.15);}
.tasbih .imam{width:13px; height:13px; border-radius:3px; background:var(--accent); transform:rotate(45deg);}

/* =====[ SECTION: APP SHELL ]===== */
#app{min-height:100vh; display:flex; flex-direction:column; position:relative;}
.screen{display:none; flex:1; flex-direction:column; animation:fadeSlide .45s cubic-bezier(.2,.8,.2,1);}
.screen.active{display:flex;}
@keyframes fadeSlide{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){ .screen{animation:none;} *{transition-duration:.01ms !important;} }

.container{width:100%; max-width:520px; margin:0 auto; padding:22px 18px 100px;}
.container.wide{max-width:920px;}

/* =====[ SECTION: RESPONSIVE / SCREEN SIZE FIXES ]===== */
/* بدل استخدام 100vh فقط (بيعمل مشاكل على موبايل مع شريط المتصفح)، بنستخدم dvh لما تكون متاحة */
.chat-screen{height:100vh;}
@supports (height: 100dvh){ .chat-screen{height:100dvh;} }
.call-overlay{min-height:100vh;}
@supports (height: 100dvh){ .call-overlay{min-height:100dvh;} }
#app{min-height:100vh;}
@supports (height: 100dvh){ #app{min-height:100dvh;} }
.loader-wrap{height:100vh;}
@supports (height: 100dvh){ .loader-wrap{height:100dvh;} }

/* تابلت */
@media (min-width:700px){
  .container{max-width:640px; padding:26px 24px 110px;}
  .container.wide{max-width:960px;}
  .role-pick{gap:18px;}
  .stats-grid{gap:16px;}
}
/* شاشات كبيرة / كمبيوتر */
@media (min-width:1024px){
  body{background:var(--surface-2);}
  #app{max-width:1180px; margin:0 auto; box-shadow:0 0 60px rgba(0,0,0,.08); background:var(--bg); min-height:100vh;}
  .container{max-width:680px;}
  .container.wide{max-width:1040px;}
  .bottom-nav{max-width:1180px; margin:0 auto; left:0; right:0;}
}
/* شاشات صغيرة جدًا (أقل من 360px) */
@media (max-width:359px){
  .container{padding:16px 12px 92px;}
  .brand-hero{padding:34px 10px 18px;}
  .stats-grid{gap:8px;}
  .stat-box b{font-size:22px;}
}

/* =====[ SECTION: TOP BAR ]===== */
.topbar{
  position:sticky; top:0; z-index:30; background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; padding:14px 18px;
}
.topbar h1{font-size:19px; margin:0; flex:1;}
.icon-btn{
  width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; color:var(--text); font-size:16px; flex-shrink:0;
}
.icon-btn:active{transform:scale(.92);}
.back-btn{transform:scaleX(-1);}

/* =====[ SECTION: BUTTONS / FORMS ]===== */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:14px 20px; border-radius:14px; border:none; font-weight:700; font-size:15px;
  background:var(--accent); color:var(--surface); width:100%; transition:transform .15s ease, opacity .15s ease;
}
[data-theme="dark"] .btn{color:var(--emerald-950);}
.btn:active{transform:scale(.97);}
.btn.secondary{background:transparent; color:var(--accent); border:1.5px solid var(--accent);}
.btn.ghost{background:var(--surface-2); color:var(--text);}
.btn.danger{background:var(--danger); color:#fff;}
.btn.sm{padding:9px 14px; font-size:13px; width:auto; border-radius:10px;}
.btn:disabled{opacity:.5; pointer-events:none;}

.field{margin-bottom:14px;}
.field label{display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; font-weight:600;}
.field input, .field select, .field textarea{
  width:100%; padding:13px 15px; border-radius:12px; border:1.5px solid var(--border);
  background:var(--surface); color:var(--text); font-size:15px; outline:none; transition:border .2s ease;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}
.field textarea{resize:vertical; min-height:70px;}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; box-shadow:var(--shadow);}
.chip{display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:999px; font-size:12px; font-weight:700;}
.chip.ok{background:rgba(47,125,94,.15); color:var(--success);}
.chip.warn{background:rgba(201,130,42,.15); color:var(--warn);}
.chip.danger{background:rgba(179,66,58,.15); color:var(--danger);}
.chip.neutral{background:var(--surface-2); color:var(--text-dim);}

.divider-orn{display:flex; align-items:center; gap:10px; margin:22px 0; color:var(--text-dim);}
.divider-orn:before, .divider-orn:after{content:""; flex:1; height:1px; background:var(--border);}

.toast{
  position:fixed; bottom:100px; right:50%; transform:translateX(50%);
  background:var(--ink-900); color:#fff; padding:12px 22px; border-radius:14px; font-size:14px; z-index:200;
  box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:all .35s ease; max-width:90%; text-align:center;
}
.toast.show{opacity:1; bottom:110px;}

.loader-wrap{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:18px; background:var(--bg);}
.loader-ring{width:56px; height:56px; border-radius:50%; border:4px solid var(--border); border-top-color:var(--accent); animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* =====[ SECTION: AUTH SCREENS ]===== */
.brand-hero{text-align:center; padding:50px 20px 30px;}
.brand-hero .logo{
  width:84px; height:84px; margin:0 auto 16px; border-radius:24px;
  background:linear-gradient(155deg,var(--emerald-700),var(--emerald-900));
  display:flex; align-items:center; justify-content:center; font-size:38px; color:var(--gold-400); box-shadow:var(--shadow);
}
.brand-hero h1{font-size:30px; margin:0 0 6px; color:var(--accent);}
.brand-hero p{color:var(--text-dim); margin:0; font-size:14px;}

.role-pick{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:24px 0;}
.role-card{
  background:var(--surface); border:2px solid var(--border); border-radius:var(--radius-md); padding:22px 14px;
  text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.role-card .emoji{font-size:30px;}
.role-card.selected{border-color:var(--accent); background:var(--surface-2);}
.role-card b{font-size:15px;}
.role-card span{font-size:12px; color:var(--text-dim);}

.tabs-switch{display:flex; background:var(--surface-2); border-radius:14px; padding:4px; margin-bottom:20px;}
.tabs-switch button{flex:1; padding:11px; border:none; background:transparent; border-radius:11px; font-weight:700; color:var(--text-dim); font-size:14px;}
.tabs-switch button.active{background:var(--surface); color:var(--accent); box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* =====[ SECTION: BOTTOM NAV (شبيه واتساب) ]===== */
.bottom-nav{
  position:fixed; bottom:0; right:0; left:0; z-index:40; background:var(--surface); border-top:1px solid var(--border);
  display:flex; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
.bottom-nav button{
  flex:1; background:none; border:none; display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:6px 2px; color:var(--text-dim); font-size:11px; font-weight:600; position:relative;
}
.bottom-nav button .ic{font-size:20px;}
.bottom-nav button.active{color:var(--accent);}
.bottom-nav .badge{
  position:absolute; top:0; left:calc(50% - 2px); background:var(--danger); color:#fff; font-size:10px;
  min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 4px;
}
/* =====[ SECTION: جرس الإشعارات ]===== */
.notif-badge{
  position:absolute; top:-3px; left:-3px; background:var(--danger); color:#fff; font-size:10px; font-weight:800;
  min-width:16px; height:16px; border-radius:8px; display:flex; align-items:center; justify-content:center; padding:0 4px;
  border:1.5px solid var(--surface);
}

/* =====[ SECTION: LISTS (طلاب/معلمات/مفاتيح) ]===== */
.list-item{
  display:flex; align-items:center; gap:12px; padding:13px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-md); margin-bottom:10px; position:relative; transition:transform .15s ease;
}
.list-item:active{transform:scale(.98);}
.avatar{
  width:48px; height:48px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:17px; color:#fff; background:linear-gradient(155deg,var(--emerald-600),var(--emerald-900));
  position:relative;
}
.avatar .dot{position:absolute; bottom:1px; left:1px; width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); background:var(--text-dim);}
.avatar .dot.online{background:var(--success);}
.li-body{flex:1; min-width:0;}
.li-body b{display:block; font-size:15px; margin-bottom:2px;}
.li-body span{display:block; font-size:12.5px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.li-meta{display:flex; flex-direction:column; align-items:flex-end; gap:6px; font-size:11px; color:var(--text-dim);}

.progress-track{height:8px; border-radius:6px; background:var(--surface-2); overflow:hidden; margin-top:6px;}
.progress-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--gold-500),var(--gold-400)); transition:width .6s ease;}

/* =====[ SECTION: CHAT (شبيه واتساب) ]===== */
.chat-screen{display:flex; flex-direction:column; height:100vh;}
.chat-header{
  display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); z-index:20;
}
.chat-header .li-body span{color:var(--success); font-weight:600;}
.chat-actions{display:flex; gap:8px;}
.chat-body-wrap{flex:1; display:flex; flex-direction:column; position:relative; min-height:0;}
.chat-body{
  flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:6px;
  background-image: radial-gradient(circle at 10px 10px, var(--border) 1px, transparent 1.4px);
  background-size:26px 26px; background-color:var(--bg);
}
.jump-latest-btn{position:absolute; bottom:14px; left:50%; transform:translateX(-50%); background:var(--accent); color:#fff; border:none; border-radius:20px; padding:8px 16px; font-size:13px; box-shadow:0 4px 12px rgba(0,0,0,.2); display:flex; align-items:center; gap:6px; z-index:5;}
.pinned-banner{display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--surface-2); border-bottom:1px solid var(--border); font-size:13px;}
.pinned-banner .pin-text{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.reply-preview-bar{display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--surface-2); border-top:1px solid var(--border);}
.attach-preview-bar{display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--surface-2); border-top:1px solid var(--border);}
.attach-preview-list{flex:1; display:flex; gap:8px; overflow-x:auto; padding:2px;}
.attach-preview-item{position:relative; flex-shrink:0; width:56px; height:56px; border-radius:10px; overflow:hidden; background:var(--surface); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px;}
.attach-preview-item img{width:100%; height:100%; object-fit:cover;}
.attach-preview-remove{position:absolute; top:-4px; left:-4px; width:18px; height:18px; border-radius:50%; background:var(--danger); color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center; border:2px solid var(--surface-2);}
.attach-send-btn{border:none; background:var(--accent); color:#fff; border-radius:16px; padding:9px 14px; font-size:13px; white-space:nowrap;}
.voice-record-bar{display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface-2); border-top:1px solid var(--border);}
.voice-record-dot{width:12px; height:12px; border-radius:50%; background:var(--danger); animation:blinkDot 1s infinite; flex-shrink:0;}
.voice-record-timer{flex:1; font-size:15px; direction:ltr; text-align:left; font-weight:700;}
.voice-record-btn{border:none; border-radius:50%; width:38px; height:38px; font-size:16px; flex-shrink:0;}
.voice-record-btn.cancel{background:var(--surface); border:1px solid var(--border); color:var(--text);}
.voice-record-btn.send{background:var(--accent); color:#fff;}
.audio-bubble{display:flex; align-items:center; gap:10px; min-width:200px;}
.audio-bubble audio{flex:1; height:36px;}
.mic-btn.recording{color:var(--danger); animation:blinkDot 1s infinite;}
.chat-body-wrap.drag-over::after{content:'أفلت الملفات هنا للإرسال 📎'; position:absolute; inset:0; background:rgba(0,0,0,.45); color:#fff; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; z-index:6; pointer-events:none; border:3px dashed var(--accent);}
.reply-preview-body{flex:1; min-width:0; border-right:3px solid var(--accent); padding-right:8px;}
.reply-preview-body b{display:block; font-size:12.5px; color:var(--accent);}
.reply-preview-body span{display:block; font-size:12.5px; opacity:.75; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.bubble .quoted-reply{background:rgba(0,0,0,0.08); border-right:3px solid var(--accent); border-radius:8px; padding:5px 8px; margin-bottom:6px; font-size:12.5px; opacity:.85; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.bubble .quoted-reply b{display:block; color:var(--accent); font-size:11.5px;}
.bubble .edited-tag{font-size:10.5px; opacity:.6; margin-right:4px;}
.typing-dots{display:inline-block;}
.chat-search-bar{display:flex; align-items:center; gap:8px; padding:8px 14px; background:var(--surface); border-bottom:1px solid var(--border);}
.chat-search-bar input{flex:1; padding:8px 12px; border-radius:20px; border:1px solid var(--border); background:var(--surface-2); font-size:13px;}
.chat-search-count{font-size:11.5px; color:var(--text-dim); white-space:nowrap;}
.bubble.search-hit{outline:2px solid var(--accent-2); outline-offset:2px;}
.bubble.search-hit-active{outline:2px solid var(--danger); outline-offset:2px;}
.bubble{max-width:78%; padding:10px 14px; border-radius:16px; font-size:14.5px; line-height:1.6; position:relative; animation:popIn .25s ease;}
@keyframes popIn{from{opacity:0; transform:scale(.9);} to{opacity:1; transform:scale(1);}}
.bubble.me{align-self:flex-start; background:var(--accent); color:var(--surface); border-bottom-left-radius:4px;}
[data-theme="dark"] .bubble.me{color:var(--emerald-950);}
.bubble.them{align-self:flex-end; background:var(--surface); border:1px solid var(--border); border-bottom-right-radius:4px;}
.bubble .meta{display:flex; gap:5px; align-items:center; justify-content:flex-end; font-size:10px; opacity:.7; margin-top:4px;}
.bubble.system{align-self:center; background:var(--surface-2); color:var(--text-dim); font-size:12px; border-radius:10px; padding:6px 12px;}
.bubble.deleted-bubble{opacity:.65; font-style:italic;}
.bubble.deleted-bubble .deleted-icon{margin-inline-end:2px;}
.chat-input-bar{display:flex; gap:8px; padding:10px 14px calc(10px + env(safe-area-inset-bottom)); background:var(--surface); border-top:1px solid var(--border); align-items:flex-end;}
.chat-input-bar textarea{flex:1; max-height:110px; border-radius:20px; padding:11px 16px;}
.send-btn{width:44px; height:44px; border-radius:50%; background:var(--accent); color:var(--surface); border:none; flex-shrink:0; font-size:17px;}
[data-theme="dark"] .send-btn{color:var(--emerald-950);}
.attach-btn{width:44px; height:44px; border-radius:50%; background:var(--surface-2); color:var(--text); border:none; flex-shrink:0; font-size:19px;}
.attach-btn:active{transform:scale(.92);}

/* =====[ SECTION: CHAT MEDIA (صور/ملفات) ]===== */
.bubble.media{padding:6px; overflow:hidden;}
.bubble .chat-img{display:block; max-width:220px; max-height:280px; width:100%; border-radius:12px; object-fit:cover; cursor:pointer;}
.bubble .chat-img-wrap{position:relative;}
.bubble .chat-img-wrap .meta{position:absolute; bottom:6px; left:8px; background:rgba(0,0,0,.45); color:#fff; padding:2px 8px; border-radius:8px;}
.bubble.file-bubble{display:flex; align-items:center; gap:10px; min-width:190px;}
.bubble.file-bubble .file-ic{width:40px; height:40px; border-radius:10px; background:rgba(0,0,0,.08); display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0;}
.bubble.file-bubble .file-info{flex:1; min-width:0;}
.bubble.file-bubble .file-info b{display:block; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px;}
.bubble.file-bubble .file-info span{font-size:11px; opacity:.75;}
.bubble.file-bubble a.file-dl{color:inherit; font-size:18px;}
.upload-progress-wrap{padding:8px 12px 4px;}
.upload-progress-bar{height:4px; border-radius:4px; background:var(--surface-2); overflow:hidden;}
.upload-progress-fill{height:100%; background:var(--accent); transition:width .2s ease;}
.img-viewer{position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:400; display:none; align-items:center; justify-content:center; padding:20px;}
.img-viewer.active{display:flex;}
.img-viewer img{max-width:100%; max-height:100%; border-radius:8px;}
.img-viewer .close-viewer{position:absolute; top:18px; left:18px; width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.15); color:#fff; border:none; font-size:18px;}

/* =====[ SECTION: ADMIN CHAT VIEWER (عرض للمراجعة فقط) ]===== */
.admin-chat-overlay{position:fixed; inset:0; z-index:350; background:var(--bg); display:none; flex-direction:column; height:100vh;}
@supports (height: 100dvh){ .admin-chat-overlay{height:100dvh;} }
.admin-chat-overlay.active{display:flex;}
.admin-chat-subtitle{color:var(--warn) !important; font-weight:600;}

/* ============ المصحف الشريف — Mushaf Reader ============ */
.mushaf-overlay{position:fixed; inset:0; z-index:400; display:none; flex-direction:column; height:100vh;}
@supports (height: 100dvh){ .mushaf-overlay{height:100dvh;} }
.mushaf-overlay.active{display:flex;}
.mushaf-overlay.mushaf-dark{--mbg:#0e2b21; --mtext:#f2ead2; --msurf:#123a2c; --mborder:rgba(242,234,210,0.14);}
.mushaf-overlay.mushaf-light{--mbg:#fbf7ec; --mtext:#20261f; --msurf:#ffffff; --mborder:rgba(27,36,31,0.12);}
.mushaf-overlay{background:var(--mbg);}
.mushaf-header{display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--msurf); border-bottom:1px solid var(--mborder); flex-shrink:0;}
.mushaf-header .li-body{flex:1; min-width:0; color:var(--mtext);}
.mushaf-header .li-body b{display:block; font-family:var(--font-display); font-size:15px;}
.mushaf-header .li-body span{font-size:12px; opacity:.7;}
.mushaf-header .icon-btn{background:transparent; border:none; color:var(--mtext); font-size:19px; padding:6px; border-radius:10px;}
.mushaf-header .icon-btn:active{background:var(--mborder);}
.mushaf-tools{display:flex; align-items:center; gap:6px; padding:8px 12px; background:var(--msurf); border-bottom:1px solid var(--mborder); flex-wrap:wrap; flex-shrink:0;}
.mushaf-tools input{flex:1; min-width:110px; padding:8px 12px; border-radius:20px; border:1px solid var(--mborder); background:var(--mbg); color:var(--mtext); font-size:13px;}
.mushaf-tools button{border:1px solid var(--mborder); background:var(--mbg); color:var(--mtext); border-radius:20px; padding:8px 12px; font-size:13px; white-space:nowrap;}
.mushaf-body{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:18px 16px 90px;}
.mushaf-loading, .mushaf-error, .mushaf-empty{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--mtext); text-align:center; padding:30px;}
.mushaf-page{max-width:640px; margin:0 auto; color:var(--mtext);}
.mushaf-surah-title{text-align:center; font-family:var(--font-display); font-size:19px; margin:22px 0 8px; padding:10px; border:1px solid var(--mborder); border-radius:14px; background:var(--msurf);}
.mushaf-bismillah{text-align:center; font-size:20px; margin:6px 0 16px; opacity:.9;}
.mushaf-text{font-family:'Amiri','Traditional Arabic',var(--font-body); line-height:2.5; text-align:justify; font-size:22px;}
.mushaf-text .ayah-num{display:inline-block; font-size:13px; font-family:var(--font-body); border:1px solid var(--mborder); border-radius:50%; width:24px; height:24px; line-height:22px; text-align:center; margin:0 4px; vertical-align:middle; color:var(--accent);}
.mushaf-footer{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 16px calc(10px + env(safe-area-inset-bottom)); background:var(--msurf); border-top:1px solid var(--mborder); flex-shrink:0;}
.mushaf-footer button{border:none; background:var(--accent); color:#fff; border-radius:14px; padding:10px 16px; font-size:15px; min-width:44px;}
.mushaf-footer button:disabled{opacity:.4;}
.mushaf-page-indicator{color:var(--mtext); font-size:13px; text-align:center; flex:1;}
.mushaf-index-list{max-width:640px; margin:0 auto;}
.mushaf-index-item{display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid var(--mborder); color:var(--mtext); cursor:pointer;}
.mushaf-index-item:active{background:var(--msurf);}
.mushaf-index-item .num{width:28px; height:28px; border-radius:50%; border:1px solid var(--accent); color:var(--accent); font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.mushaf-index-item .nm{flex:1; padding:0 10px; font-family:var(--font-display); font-size:15px;}
.mushaf-index-item .pg{font-size:12px; opacity:.6;}
.mushaf-text.fz-1{font-size:18px;} .mushaf-text.fz-2{font-size:20px;} .mushaf-text.fz-3{font-size:22px;} .mushaf-text.fz-4{font-size:25px;} .mushaf-text.fz-5{font-size:29px;}
.mushaf-overlay.mushaf-fullscreen .mushaf-tools{display:none;}
.admin-del-tag{margin-top:6px; font-size:11px; opacity:.8; background:rgba(0,0,0,.08); border-radius:8px; padding:4px 8px;}
[data-theme="dark"] .admin-del-tag{background:rgba(255,255,255,.08);}
.admin-sender-tag{margin-bottom:4px; font-size:11.5px; font-weight:700; color:var(--accent);}

/* =====[ SECTION: CALL UI ]===== */
.call-overlay{
  position:fixed; inset:0; z-index:300; background:linear-gradient(180deg,var(--emerald-950),var(--emerald-900));
  display:none; flex-direction:column; align-items:center; justify-content:space-between; color:#f2ead2; padding:40px 24px calc(40px + env(safe-area-inset-bottom));
  text-align:center;
}
.call-overlay.active{display:flex;}
.call-overlay .avatar{width:110px; height:110px; font-size:38px; margin:auto 0 12px;}
.call-status{font-size:14px; opacity:.75; letter-spacing:.5px; display:flex; align-items:center; justify-content:center; gap:6px;}
.call-conn-dot{width:8px; height:8px; border-radius:50%; background:var(--text-dim); flex-shrink:0;}
.call-conn-dot.good{background:var(--success);}
.call-conn-dot.reconnecting{background:var(--gold-500); animation:blinkDot 1s infinite;}
.call-conn-dot.bad{background:var(--danger);}
@keyframes blinkDot{0%,100%{opacity:1;}50%{opacity:.3;}}
.call-peer-muted{font-size:12.5px; opacity:.7; margin-top:4px;}
.call-retry-btn{margin-top:10px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); border-radius:14px; padding:8px 18px; font-size:13.5px;}
.call-name{font-size:24px; font-family:var(--font-display);}
.call-timer{font-size:15px; opacity:.85; direction:ltr;}
.pulse-ring{position:relative;}
.pulse-ring:before{content:""; position:absolute; inset:-14px; border-radius:50%; border:2px solid var(--gold-400); animation:pulse 1.8s ease-out infinite;}
@keyframes pulse{0%{opacity:.8; transform:scale(.85);} 100%{opacity:0; transform:scale(1.35);}}
.call-actions{display:flex; gap:26px; align-items:center;}
.call-btn{
  width:64px; height:64px; border-radius:50%; border:none; font-size:24px; display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.12); color:#fff;
}
.call-btn.reject, .call-btn.end{background:var(--danger); width:70px; height:70px; font-size:27px;}
.call-btn.accept{background:var(--success); width:70px; height:70px; font-size:27px;}
.call-btn.mute.active{background:var(--gold-500); color:var(--emerald-950);}
.call-btn.speaker{background:rgba(255,255,255,0.12);}
.call-btn.speaker:not(.active){background:rgba(255,255,255,0.06); opacity:.6;}

/* =====[ SECTION: CALL AVATAR + SOUNDWAVE (شاشة المكالمة الكاملة) ]===== */
.call-avatar-wrap{position:relative; display:flex; align-items:center; justify-content:center; margin:auto 0 12px;}
.soundwave{position:absolute; inset:-30px; display:flex; align-items:center; justify-content:center; gap:5px; pointer-events:none; opacity:0; transition:opacity .25s ease;}
.soundwave.speaking{opacity:1;}
.soundwave span{width:4px; height:8px; border-radius:3px; background:var(--gold-400); animation:soundBar 0.9s ease-in-out infinite;}
@keyframes soundBar{0%,100%{height:8px;} 50%{height:26px;}}

/* =====[ SECTION: CALL ROOM SHEET (شيت إنشاء/انضمام غرفة الاتصال داخل الشات) ]===== */
.call-sheet-icon{width:64px; height:64px; border-radius:50%; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 14px;}
.call-room-card{background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md); padding:18px 16px; margin-top:6px; text-align:center;}
.call-room-status{display:flex; align-items:center; justify-content:center; gap:8px; font-size:13px; color:var(--text-dim); margin-bottom:10px;}
.call-room-code{font-family:ui-monospace,Consolas,monospace; direction:ltr; font-size:21px; font-weight:800; letter-spacing:3px; background:var(--surface); border:1px dashed var(--border); border-radius:12px; padding:10px 14px; margin-bottom:16px; color:var(--accent);}
.call-waiting-wrap{display:flex; flex-direction:column; align-items:center; text-align:center; padding:14px 6px 6px;}
.call-waiting-wrap b{font-size:16px; margin-top:6px;}
.call-waiting-ring{position:relative; width:84px; height:84px; margin-bottom:16px; display:flex; align-items:center; justify-content:center;}
.call-waiting-ring:before,.call-waiting-ring:after{content:""; position:absolute; inset:0; border-radius:50%; border:2px solid var(--gold-400); animation:pulse 1.8s ease-out infinite;}
.call-waiting-ring:after{animation-delay:.6s;}
.call-waiting-ring .ic{position:relative; font-size:30px; z-index:1;}
.call-invited-wrap{text-align:center; padding:6px;}

/* =====[ SECTION: CALL INVITE BUBBLE (فقاعة دعوة المكالمة داخل الشات) ]===== */
.bubble.call-invite-bubble{display:flex; flex-wrap:wrap; align-items:center; gap:8px 10px; max-width:82%; padding:12px 14px;}
.bubble.call-invite-bubble .call-invite-ic{width:36px; height:36px; border-radius:50%; background:rgba(0,0,0,0.08); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0;}
.bubble.call-invite-bubble.me .call-invite-ic{background:rgba(255,255,255,0.18);}
.bubble.call-invite-bubble .call-invite-text{flex:1; min-width:120px;}
.bubble.call-invite-bubble .call-invite-text b{display:block; font-size:13.5px;}
.bubble.call-invite-bubble .call-invite-text span{font-size:12px; opacity:.85;}
.bubble.call-invite-bubble .call-invite-join-btn{flex-basis:100%; padding:9px 14px; font-size:13.5px; border-radius:12px;}
.bubble.call-invite-bubble.me .call-invite-join-btn{background:#fff; color:var(--accent);}
.bubble.call-invite-bubble .meta{flex-basis:100%; margin-top:2px;}

/* =====[ SECTION: INCOMING CALL BANNER ]===== */
.incoming-banner{
  position:fixed; top:14px; right:14px; left:14px; z-index:250; background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:14px; display:none; align-items:center; gap:12px; box-shadow:var(--shadow); animation:dropIn .4s ease;
}
.incoming-banner.active{display:flex;}
@keyframes dropIn{from{transform:translateY(-40px); opacity:0;} to{transform:translateY(0); opacity:1;}}

/* =====[ SECTION: MODAL ]===== */
.modal-bg{position:fixed; inset:0; background:rgba(7,35,26,0.55); z-index:150; display:none; align-items:flex-end; justify-content:center;}
.modal-bg.active{display:flex;}
.modal-sheet{
  background:var(--surface); width:100%; max-width:520px; border-radius:24px 24px 0 0; padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  animation:sheetUp .35s cubic-bezier(.2,.8,.2,1); max-height:85vh; overflow-y:auto;
}
@keyframes sheetUp{from{transform:translateY(60px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-sheet h3{margin:0 0 16px;}
.sheet-handle{width:40px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 16px;}

/* =====[ SECTION: STARS ]===== */
.stars{display:flex; gap:8px; justify-content:center; font-size:34px; direction:ltr; margin:14px 0;}
.stars span{color:var(--border); cursor:pointer; transition:transform .15s ease;}
.stars span.filled{color:var(--gold-500); transform:scale(1.1);}

/* =====[ SECTION: STATS GRID ]===== */
.stats-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;}
.stat-box{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px; text-align:center;}
.stat-box b{font-size:26px; display:block; color:var(--accent); font-family:var(--font-display);}
.stat-box span{font-size:12px; color:var(--text-dim);}
/* ============ ودجت مواقيت الصلاة ============ */
.prayer-widget{background:linear-gradient(135deg, var(--accent), var(--emerald-700)); border-radius:var(--radius-md); padding:14px 16px; margin-bottom:16px; color:#fff;}
[data-theme="dark"] .prayer-widget{background:linear-gradient(135deg, var(--emerald-800), var(--emerald-950));}
.prayer-widget-top{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.prayer-widget-next b{font-size:17px; display:block; font-family:var(--font-display);}
.prayer-widget-next span{font-size:12px; opacity:.85;}
.prayer-widget-countdown{font-size:20px; font-family:var(--font-display); direction:ltr;}
.prayer-widget-list{display:flex; justify-content:space-between; margin-top:12px; padding-top:10px; border-top:1px solid rgba(255,255,255,0.2); gap:4px;}
.prayer-widget-list div{text-align:center; font-size:11px; flex:1;}
.prayer-widget-list div b{display:block; font-size:12.5px; margin-top:2px;}
.prayer-widget-list div.next-p{opacity:1; font-weight:800;}
.prayer-widget-list div:not(.next-p){opacity:.8;}
.adhkar-open-btn{width:100%; text-align:right; background:var(--surface-2); border:1px solid var(--border); border-radius:14px; padding:12px 14px; margin-bottom:16px; display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text);}
.adhkar-tabs{display:flex; gap:8px; margin-bottom:14px;}
.adhkar-tabs button{flex:1; padding:9px; border-radius:12px; border:1px solid var(--border); background:var(--surface-2); color:var(--text); font-size:13px;}
.adhkar-tabs button.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.adhkar-item{border:1px solid var(--border); border-radius:14px; padding:12px 14px; margin-bottom:10px; display:flex; align-items:center; gap:12px;}
.adhkar-item.done{opacity:.45;}
.adhkar-item p{flex:1; margin:0; font-size:14px; line-height:1.9; font-family:var(--font-display);}
.adhkar-count-btn{width:40px; height:40px; border-radius:50%; border:2px solid var(--accent); color:var(--accent); background:transparent; font-weight:800; font-size:14px; flex-shrink:0;}
.streak-chip{display:inline-flex; align-items:center; gap:4px; background:rgba(201,130,42,0.15); color:var(--warn); padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700;}

.section-title{font-size:14px; font-weight:800; color:var(--text-dim); margin:22px 0 12px; display:flex; align-items:center; justify-content:space-between;}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-dim);}
.empty-state .emoji{font-size:44px; margin-bottom:10px; display:block;}

.badge-item{display:flex; align-items:center; gap:10px; background:var(--surface-2); padding:10px 12px; border-radius:12px; margin-bottom:8px;}
.badge-item .ic{font-size:20px;}

.segmented{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px;}
.segmented button{white-space:nowrap; padding:9px 16px; border-radius:12px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); font-weight:700; font-size:13px;}
.segmented button.active{background:var(--accent); color:var(--surface); border-color:var(--accent);}
[data-theme="dark"] .segmented button.active{color:var(--emerald-950);}

.key-code{font-family:monospace; direction:ltr; font-size:15px; font-weight:700; letter-spacing:1px; background:var(--surface-2); padding:4px 10px; border-radius:8px;}

/* =====[ SECTION: ADMIN KEYS TOOLBAR (بحث/فلاتر/ترتيب/إجراءات جماعية) ]===== */
.keys-toolbar{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
.keys-toolbar .row{display:flex; gap:8px; flex-wrap:wrap;}
.keys-toolbar select{flex:1; min-width:110px; padding:10px 12px; border-radius:12px; border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-size:13px;}
.keys-bulk-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--surface-2); border-radius:12px; padding:8px 10px; margin-bottom:10px; font-size:12.5px;}
.keys-bulk-bar b{margin-left:auto;}
.key-check{width:19px; height:19px; flex-shrink:0; accent-color:var(--accent);}
.key-actions-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.pagination-bar{display:flex; align-items:center; justify-content:center; gap:14px; margin:16px 0 6px; font-size:13px; color:var(--text-dim);}
</style>
</head>
<body>
<div id="app"><div class="loader-wrap"><div class="loader-ring"></div><div style="font-family:var(--font-display);color:var(--accent);font-size:18px">رواسخ أكاديمية</div></div></div>

<div class="toast" id="toast"></div>
<div class="incoming-banner" id="incomingBanner"></div>
<div class="call-overlay" id="callOverlay"></div>
<div class="modal-bg" id="modalBg"><div class="modal-sheet" id="modalSheet"></div></div>
<div class="img-viewer" id="imgViewer"><button class="close-viewer" id="btnCloseViewer">✕</button><img id="imgViewerImg" src="" alt=""></div>
<div class="admin-chat-overlay" id="adminChatOverlay">
  <div class="chat-header">
    <button class="icon-btn back-btn" id="btnCloseAdminChat">➜</button>

</div>

</div>

<script>
/* =====[ SECTION: CONFIG — عدّل هنا فقط ]===== */
const FIREBASE_CONFIG = {

// بيتم بالكامل عبر Firebase Realtime Database اللي أصلاً شغالة في المنصة (مفيش سيرفر إضافي مطلوب).

// TURN: مطلوب لو حد من الطرفين هيستخدم المنصة من شبكة شركة/جامعة (فايروول قوي بيمنع الاتصال المباشر).

const ICE_SERVERS = [

/* =====[ SECTION: UTILITIES ]===== */
function $(sel,root=document){return root.querySelector(sel);}
function $all(sel,root=document){return [...root.querySelectorAll(sel)];}
function esc(str){ if(str==null) return ''; return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, ms=2600){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), ms);
}
function initials(name){ if(!name) return '؟'; return name.trim().split(' ').slice(0,2).map(w=>w[0]).join(''); }
function fmtTime(ts){ if(!ts) return ''; const d=new Date(ts); return d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(ts){ if(!ts) return ''; const d=new Date(ts); return d.toLocaleDateString('ar-EG',{day:'numeric',month:'short'}); }
function fmtDuration(sec){ const m=Math.floor(sec/60).toString().padStart(2,'0'); const s=(sec%60).toString().padStart(2,'0'); return `${m}:${s}`; }
function pairId(a,b){ return [a,b].sort().join('_'); }
// مولّد كود اشتراك من 8 خانات (استبعدت الحروف/الأرقام المتشابهة بصريًا زي 0/O و1/I)
function uid8(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for(let i=0;i<8;i++){ s += chars[Math.floor(Math.random()*chars.length)]; }
  return s;
}
function getDeviceId(){
  let id = localStorage.getItem('rw_device_id');
  if(!id){ id = 'dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,10); localStorage.setItem('rw_device_id', id); }
  return id;
}
// حفظ آخر تاب مفتوح (لوحة الأدمن / تبويبات المعلمة أو الطالب) في localStorage، عشان
// لما المستخدم يعمل Refresh للصفحة، يرجع لنفس الشاشة اللي كان فيها بدل ما يترمي
// دايمًا على الشاشة الرئيسية (كانت المتغيرات دي بتتصفر لقيمتها الافتراضية مع كل تحميل
// جديد للصفحة لأنها كانت مجرد متغيرات JS عادية في الذاكرة من غير أي حفظ).
function saveNavTab(key, value){ try{ localStorage.setItem('rw_nav_'+key, value); }catch(_){} }
function loadNavTab(key, fallback){ try{ return localStorage.getItem('rw_nav_'+key) || fallback; }catch(_){ return fallback; } }

// حفظ الشات المفتوح حالياً (نفس فكرة saveNavTab/loadNavTab فوق) عشان لو المستخدم
// عمل Refresh وهو جوه شات معين، يرجّعه لنفس الشات بدل ما يترمي على الشاشة الرئيسية.
// بنخزن معاه uid صاحب الحساب (myUid) عشان لو حساب تاني سجّل دخول بعد كده على نفس
// الجهاز/المتصفح، مانرجّعوش على شات مش بتاعه بالغلط.
function saveChatWith(o){
  try{ localStorage.setItem('rw_chat_with', JSON.stringify({uid:o.uid, name:o.name, myUid: state.user? state.user.uid : null})); }catch(_){}
}
function loadChatWith(myUid){
  try{
    const raw = localStorage.getItem('rw_chat_with');
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.uid || parsed.myUid !== myUid) return null;
    return {uid: parsed.uid, name: parsed.name};
  }catch(_){ return null; }
}
function clearChatWith(){ try{ localStorage.removeItem('rw_chat_with'); }catch(_){} }

/* =====[ SECTION: BACK BUTTON / HISTORY NAV STACK ]===== */
// المشكلة الأصلية: زرار الرجوع في الموبايل كان بيقفل التاب فورًا من أي شاشة،
// حتى الشاشة الرئيسية، لأنه مكنش فيه غير "خطوة واحدة" في تاريخ المتصفح؛ يعني
// أول ضغطة Back كانت بتقفل الصفحة قبل حتى ما نقدر نلحق نتصرف فيها بالجافاسكريبت.
// الحل: من أول ما الصفحة تفتح، بنضيف "خطوة احتياطية" في history فورًا، فبيبقى
// دايمًا فيه خطوة يرجعلها المتصفح جوه نفس الصفحة بدل ما يقفلها على طول.
//
// بعد كده، أي طبقة إضافية بنفتحها (شات/مودال/صورة) بتضيف خطوة زيادة فوق دي.
// ولو المستخدم دوس Back وهو مفيش أي طبقة مفتوحة (يعني واقف على شاشة رئيسية):
//  - أول ضغطة: بنمنعها، نورّي تنبيه "اضغط رجوع تاني للخروج"، ونعيد بناء الخطوة
//    الاحتياطية (يعني بيفضل جوه المنصة).
//  - ضغطة تانية خلال ثانيتين: بنسيبها تعدي عادي ويخرج فعلاً من المنصة.
// (نفس فكرة "اضغط رجوع مرة أخرى للخروج" الموجودة في واتساب/إنستجرام وغيرهم).
let navStack = [];
let suppressNextPopstate = false;
let lastRootBackAt = 0;
const ROOT_BACK_EXIT_WINDOW = 2000; // مللي ثانية — لازم يدوس مرتين خلالها عشان يخرج فعليًا

function pushNav(type){
  navStack.push(type);
  try{ history.pushState({rwNav:true, depth:navStack.length}, ''); }catch(_){}
}
// بتتنادى لما المستخدم يقفل الطبقة بنفسه (زرار X مثلاً) مش بزرار الرجوع،
// عشان نلغي الـ history entry اللي كنا ضفناها وقت الفتح من غير ما نعمل تكرار.
function popNavIfMatches(type){
  if(navStack.length && navStack[navStack.length-1]===type){
    navStack.pop();
    suppressNextPopstate = true;
    try{ history.back(); }catch(_){}
  }
}
// الخطوة الاحتياطية الأولى — لازم تتنفذ فورًا عند تحميل الصفحة قبل أي ضغطة Back محتملة.
try{ history.pushState({rwRoot:true}, ''); }catch(_){}

window.addEventListener('popstate', ()=>{
  if(suppressNextPopstate){ suppressNextPopstate = false; return; }
  if(navStack.length){
    const type = navStack.pop();
    if(type==='imgViewer') closeImgViewer(true);
    else if(type==='modal') hideModal(true);
    else if(type==='chat') closeChat(true);
    else if(type==='adminChatView') closeAdminChatView(true);
    else if(type==='mushaf') closeMushaf(true);
    return;
  }
  // مفيش طبقة مفتوحة — المستخدم واقف على شاشة رئيسية وبيحاول يخرج بالكامل.
  const now = Date.now();
  if(now - lastRootBackAt < ROOT_BACK_EXIT_WINDOW){
    return; // ضغطة تانية خلال الوقت المسموح — اسمح بالخروج الحقيقي
  }
  lastRootBackAt = now;
  toast('اضغط رجوع مرة أخرى للخروج من المنصة');
  try{ history.pushState({rwRoot:true}, ''); }catch(_){} // إعادة بناء الخطوة الاحتياطية عشان يفضل جوه المنصة
});

const MUSHAF_TEXT_URL = 'https://cdn.jsdelivr.net/npm/quran-json@3.1.2/dist/quran.json';
const MUSHAF_DB_NAME = 'rawasekhMushafDB';
const MUSHAF_DB_STORE = 'quranText';

const mushafState = {
  page: 1,
  fontSize: parseInt(localStorage.getItem('rw_mushaf_fontsize')||'3', 10),
  theme: localStorage.getItem('rw_mushaf_theme') || 'dark',
  fullscreen: false,
  text: null, // يتم ملؤه بعد التحميل: { [surahId]: ["نص آية1","نص آية2", ...] }
  loading: false
};

function mushafCmpRef(a, b){ return (a[0]*1000 + a[1]) - (b[0]*1000 + b[1]); }

function mushafPageOf(surah, ayah){
  const ref = [surah, ayah];
  let lo = 1, hi = 604, ans = 1;
  while(lo <= hi){
    const mid = (lo+hi) >> 1;
    if(mushafCmpRef(MUSHAF_PAGE_STARTS[mid], ref) <= 0){ ans = mid; lo = mid+1; }
    else hi = mid-1;
  }
  return ans;
}
function mushafRubOf(surah, ayah){
  const ref = [surah, ayah];
  let lo = 1, hi = 240, ans = 1;
  while(lo <= hi){
    const mid = (lo+hi) >> 1;
    if(mushafCmpRef(MUSHAF_RUB_STARTS[mid], ref) <= 0){ ans = mid; lo = mid+1; }
    else hi = mid-1;
  }
  return ans;
}
function mushafHizbOf(rub){ return Math.ceil(rub/4); }
function mushafJuzOf(rub){ return Math.ceil(rub/8); }

function mushafSurahMeta(id){
  const s = MUSHAF_SURAHS[id];
  return { id, name: s[4], count: s[1], startPage: s[6], meccan: s[5] };
}
function mushafSurahAtPage(page){ return MUSHAF_PAGE_STARTS[page][0]; }

// بيرجع مجموعة نطاقات (سورة, من آية, لحد آية) اللي بتتضمنها صفحة معينة
function mushafPageRanges(page){
  const start = MUSHAF_PAGE_STARTS[page];
  const end = page < 604 ? MUSHAF_PAGE_STARTS[page+1] : [115,1];
  const ranges = [];
  for(let s = start[0]; s <= end[0]; s++){
    const meta = MUSHAF_SURAHS[s];
    if(!meta) break;
    const from = (s === start[0]) ? start[1] : 1;
    const to = (s === end[0]) ? (end[1]-1) : meta[1];
    if(to >= from) ranges.push({ surah: s, from, to });
  }
  return ranges;
}

const MUSHAF_EASTERN_DIGITS = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
function mushafEasternNum(n){ return String(n).split('').map(c => /[0-9]/.test(c) ? MUSHAF_EASTERN_DIGITS[+c] : c).join(''); }

// ============ IndexedDB — تخزين نص القرآن محليًا بعد أول تحميل ============
function mushafIdbOpen(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(MUSHAF_DB_NAME, 1);
    req.onupgradeneeded = () => { req.result.createObjectStore(MUSHAF_DB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function mushafIdbGet(key){
  try{
    const dbc = await mushafIdbOpen();
    return await new Promise((resolve, reject) => {
      const tx = dbc.transaction(MUSHAF_DB_STORE, 'readonly');
      const r = tx.objectStore(MUSHAF_DB_STORE).get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }catch(_){ return null; }
}
async function mushafIdbSet(key, value){
  try{
    const dbc = await mushafIdbOpen();
    await new Promise((resolve, reject) => {
      const tx = dbc.transaction(MUSHAF_DB_STORE, 'readwrite');
      tx.objectStore(MUSHAF_DB_STORE).put(value, key);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }catch(_){ /* تجاهل — التخزين تحسين إضافي مش أساسي لعمل الميزة */ }
}

async function mushafLoadText(){
  if(mushafState.text) return mushafState.text;
  // 1) نجرب الكاش المحلي الأول (يشتغل حتى بدون إنترنت بعد أول استخدام)
  const cached = await mushafIdbGet('fullText');
  if(cached){ mushafState.text = cached; return cached; }
  // 2) لو مفيش كاش، نحمل من الإنترنت مرة واحدة بس
  const res = await fetch(MUSHAF_TEXT_URL);
  if(!res.ok) throw new Error('فشل تحميل نص المصحف');
  const raw = await res.json();
  const map = {};
  raw.forEach(surahObj => { map[surahObj.id] = surahObj.verses.map(v => v.text); });
  mushafState.text = map;
  mushafIdbSet('fullText', map); // تخزين بالخلفية، من غير ما نستنى
  return map;
}

function openMushaf(){
  $('#mushafOverlay').classList.add('active');
  $('#mushafOverlay').className = 'mushaf-overlay active mushaf-' + mushafState.theme;
  pushNav('mushaf');
  const savedPage = parseInt(localStorage.getItem('rw_mushaf_last_page')||'1', 10);
  mushafState.page = (savedPage >= 1 && savedPage <= 604) ? savedPage : 1;
  mushafRenderPage(mushafState.page);
  bindMushafEventsOnce();
}
function closeMushaf(fromBack){
  $('#mushafOverlay').classList.remove('active');
  if(mushafState.fullscreen){ try{ document.exitFullscreen && document.exitFullscreen(); }catch(_){} mushafState.fullscreen = false; }
  if(!fromBack) popNavIfMatches('mushaf');
}

let mushafEventsBound = false;
function bindMushafEventsOnce(){
  if(mushafEventsBound) return;
  mushafEventsBound = true;
  $('#btnCloseMushaf').addEventListener('click', () => closeMushaf());
  $('#btnMushafPrev').addEventListener('click', () => mushafGoPage(mushafState.page + 1)); // السابقة = رقم صفحة أكبر (تصفح من اليمين لليسار)
  $('#btnMushafNext').addEventListener('click', () => mushafGoPage(mushafState.page - 1));
  $('#btnMushafIndex').addEventListener('click', () => mushafRenderIndex());
  $('#btnMushafTheme').addEventListener('click', () => {
    mushafState.theme = mushafState.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('rw_mushaf_theme', mushafState.theme);
    $('#mushafOverlay').className = 'mushaf-overlay active mushaf-' + mushafState.theme + (mushafState.fullscreen ? ' mushaf-fullscreen' : '');
  });
  $('#btnMushafFullscreen').addEventListener('click', () => {
    const el = $('#mushafOverlay');
    mushafState.fullscreen = !mushafState.fullscreen;
    el.classList.toggle('mushaf-fullscreen', mushafState.fullscreen);
    if(mushafState.fullscreen){ try{ el.requestFullscreen && el.requestFullscreen(); }catch(_){} }
    else { try{ document.exitFullscreen && document.fullscreenElement && document.exitFullscreen(); }catch(_){} }
  });
  $('#btnMushafFontPlus').addEventListener('click', () => mushafSetFontSize(mushafState.fontSize + 1));
  $('#btnMushafFontMinus').addEventListener('click', () => mushafSetFontSize(mushafState.fontSize - 1));
  $('#btnMushafSearchGo').addEventListener('click', mushafDoSearch);
  $('#mushafSearchInput').addEventListener('keydown', e => { if(e.key === 'Enter') mushafDoSearch(); });
  // Swipe للتنقل بين الصفحات على الموبايل
  let touchStartX = null;
  $('#mushafBody').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
  $('#mushafBody').addEventListener('touchend', e => {
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    touchStartX = null;
    if(Math.abs(dx) < 60) return;
    if(dx < 0) mushafGoPage(mushafState.page - 1); // سحب لليسار → الصفحة التالية
    else mushafGoPage(mushafState.page + 1); // سحب لليمين → الصفحة السابقة
  }, {passive:true});
}

function mushafSetFontSize(v){
  mushafState.fontSize = Math.max(1, Math.min(5, v));
  localStorage.setItem('rw_mushaf_fontsize', String(mushafState.fontSize));
  const el = $('.mushaf-text');
  if(el){ el.className = 'mushaf-text fz-' + mushafState.fontSize; }
}

function mushafGoPage(page){
  if(page < 1 || page > 604) return;
  mushafRenderPage(page);
}

async function mushafRenderPage(page){
  mushafState.page = page;
  localStorage.setItem('rw_mushaf_last_page', String(page));
  const body = $('#mushafBody');
  const surahAtStart = mushafSurahAtPage(page);
  const meta = mushafSurahMeta(surahAtStart);
  $('#mushafSurahName').textContent = meta.name;
  $('#mushafPageLabel').textContent = 'صفحة ' + mushafEasternNum(page);
  $('#mushafPageIndicator').textContent = 'صفحة ' + mushafEasternNum(page) + ' من ٦٠٤';
  $('#btnMushafPrev').disabled = page >= 604;
  $('#btnMushafNext').disabled = page <= 1;

  if(!mushafState.text){
    body.innerHTML = `<div class="mushaf-loading"><div class="loader-ring"></div><div>جاري تحميل نص المصحف لأول مرة… بعد كده هيشتغل بدون إنترنت</div></div>`;
    try{
      await mushafLoadText();
    }catch(err){
      body.innerHTML = `<div class="mushaf-error">تعذر تحميل نص المصحف. تأكد من الاتصال بالإنترنت وحاول تاني.<br><button id="btnMushafRetry" style="margin-top:10px;border:1px solid var(--mborder);background:var(--msurf);color:var(--mtext);border-radius:14px;padding:8px 16px;">إعادة المحاولة</button></div>`;
      $('#btnMushafRetry')?.addEventListener('click', () => mushafRenderPage(page));
      return;
    }
    if(mushafState.page !== page) return; // المستخدم غيّر الصفحة أثناء التحميل
  }

  const ranges = mushafPageRanges(page);
  let html = `<div class="mushaf-page"><div class="mushaf-text fz-${mushafState.fontSize}">`;
  ranges.forEach(r => {
    const m = mushafSurahMeta(r.surah);
    if(r.from === 1){
      html += `</div><div class="mushaf-surah-title">سورة ${esc(m.name)}</div>`;
      if(r.surah !== 1 && r.surah !== 9){
        html += `<div class="mushaf-bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>`;
      }
      html += `<div class="mushaf-text fz-${mushafState.fontSize}">`;
    }
    const verses = mushafState.text[r.surah] || [];
    for(let a = r.from; a <= r.to; a++){
      const t = verses[a-1] || '';
      html += esc(t) + ` <span class="ayah-num">${mushafEasternNum(a)}</span> `;
    }
  });
  html += `</div></div>`;
  body.innerHTML = html;
  body.scrollTop = 0;
}

function mushafRenderIndex(){
  const body = $('#mushafBody');
  let html = `<div class="mushaf-index-list">`;
  for(let i = 1; i <= 114; i++){
    const m = mushafSurahMeta(i);
    html += `<div class="mushaf-index-item" data-surah="${i}"><span class="num">${mushafEasternNum(i)}</span><span class="nm">${esc(m.name)}</span><span class="pg">صفحة ${mushafEasternNum(m.startPage)}</span></div>`;
  }
  html += `</div>`;
  body.innerHTML = html;
  $all('.mushaf-index-item', body).forEach(el => {
    el.addEventListener('click', () => {
      const s = parseInt(el.dataset.surah, 10);
      mushafGoPage(mushafSurahMeta(s).startPage);
    });
  });
}

  }

    if(num >= 1 && num <= 60){ mushafGoPage(mushafPageOf(...MUSHAF_RUB_STARTS[(num-1)*4 + 1])); return; }
  }
  if(/^(ربع|ر)/.test(normalized) && num){
    if(num >= 1 && num <= 240){ mushafGoPage(mushafPageOf(...MUSHAF_RUB_STARTS[num])); return; }
  }
  if(/^(صفحة|صفحه|ص)/.test(normalized) && num){
    if(num >= 1 && num <= 604){ mushafGoPage(num); return; }
  }
  // رقم بمفرده من غير كلمة قبله → نعتبره رقم صفحة (الاستخدام الأكثر شيوعًا)
  if(num !== null && /^\d+$/.test(raw.trim())){
    if(num >= 1 && num <= 604){ mushafGoPage(num); return; }
  }
  // مفيش رقم → نبحث باسم السورة
  const needle = raw.replace(/^(سورة|سوره)\s*/,'').trim();
  for(let i = 1; i <= 114; i++){
    const m = mushafSurahMeta(i);
    if(m.name.includes(needle) || needle.includes(m.name)){ mushafGoPage(m.startPage); return; }
  }
  toast('مفيش نتيجة مطابقة — جرب اسم سورة أو رقم صفحة/جزء/حزب');
}

}

  for(let i=0;i<total;i++){ html += `<div class="bead ${i<filled?'filled':''}"></div>`; }

}

function render(){

  const isAdminUser = !!(state.profile && state.profile.role==='admin');
  if(state.maintenance && state.maintenance.enabled && !isAdminUser && state.route!=='loading'){

  if(state.route==='pending'){ app.innerHTML = screenPending(); bindPendingEvents(); return; }
  if(state.route==='banned'){ app.innerHTML = screenBanned(); bindBannedEvents(); return; }
  if(state.route==='expired'){ app.innerHTML = screenExpired(); bindExpiredEvents(); return; }

  if(state.chatWith){ app.innerHTML = screenChat(); bindChatEvents(); return; }

  if(state.profile && state.profile.role==='teacher'){ app.innerHTML = screenTeacherShell(); bindTeacherEvents(); return; }

function usernameToEmail(u){ return u.trim().toLowerCase().replace(/[^a-z0-9_.]/g,'') + '@rawasekh.app'; }

async function doLogin(){
  const uname = $('#loginUsername').value.trim();
  const pass = $('#loginPassword').value;
  if(!uname || !pass){ toast('من فضلك أدخل اسم المستخدم وكلمة المرور'); return; }
  const btn = $('#btnLogin'); btn.disabled = true; btn.textContent='جارِ الدخول...';
  try{
    await auth.signInWithEmailAndPassword(usernameToEmail(uname), pass);
  }catch(e){
    logSecurityAlert('login_failed', uname);
    toast('بيانات الدخول غير صحيحة');
  } finally { if(btn){btn.disabled=false; btn.textContent='دخول';} }
}
async function doRegister(){
  const name = $('#regName').value.trim();
  const uname = $('#regUsername').value.trim();
  const pass = $('#regPassword').value;
  if(!regRole){ toast('اختر دورك أولاً'); return; }
  if(!name || !uname || pass.length<8){ toast('أكمل البيانات (كلمة المرور 8 أحرف على الأقل)'); return; }
  const cleanUname = uname.toLowerCase().replace(/[^a-z0-9_.]/g,'');
  if(cleanUname.length<3){ toast('اسم مستخدم غير صالح'); return; }
  const btn = $('#btnRegister'); btn.disabled=true; btn.textContent='جارِ الإنشاء...';
  let cred = null, claimed = false;
  try{
    // فحص سريع (قراءة عامة مسموحة للكل حتى بدون تسجيل دخول) عشان منعملش حساب Auth
    // من غير داعي لو الاسم مأخوذ أصلاً
    const preSnap = await db.ref('usernames/'+cleanUname).get();
    if(preSnap.exists()){ toast('اسم المستخدم مستخدم بالفعل'); return; }

    // لازم ننشئ حساب الـ Auth الأول، لأن رول الفايربيس بتشترط auth != null
    // على أي كتابة تحت usernames/ — الحجز مينفعش يحصل قبل تسجيل الدخول
    cred = await auth.createUserWithEmailAndPassword(usernameToEmail(cleanUname), pass);
    const newUid = cred.user.uid;

    // حجز اسم المستخدم بشكل ذرّي (transaction) بدل قراءة-ثم-كتابة، عشان نمنع
    // احتمال (نادر لكن حقيقي) إن اتنين يسجلوا بنفس اليوزرنيم في نفس اللحظة بالظبط.
    // القيمة المكتوبة لازم تبقى uid الحقيقي (مش placeholder) عشان تتطابق مع الرول.
    const txResult = await db.ref('usernames/'+cleanUname).transaction(cur => cur===null ? newUid : undefined);
    if(!txResult.committed){
      toast('اسم المستخدم مستخدم بالفعل');
      try{ await cred.user.delete(); }catch(_){}
      return;
    }
    claimed = true;

    await db.ref('users/'+newUid).set({
      name, username:cleanUname, role:regRole, status:'pending', createdAt: firebase.database.ServerValue.TIMESTAMP
    });
    toast('تم إنشاء الحساب، بانتظار تفعيل الأدمن');
  }catch(e){
    if(claimed){ try{ await db.ref('usernames/'+cleanUname).remove(); }catch(_){} }
    if(cred && cred.user){ try{ await cred.user.delete(); }catch(_){} }
    toast('حدث خطأ: ' + (e.message||'حاول مرة أخرى'));
  } finally { if(btn){btn.disabled=false; btn.textContent='إنشاء الحساب';} }
}

async function redeemCode(){
  const code = $('#redeemCode').value.trim().toUpperCase();
  if(!code){ toast('اكتب الكود'); return; }
  const btn = $('#btnRedeem'); btn.disabled=true; btn.textContent='جارِ التفعيل...';
  const dId = getDeviceId();
  const myUid = state.user.uid;
  const myRole = state.profile.role;
  try{
    // عيب #7 (مُصلَح): كانت العملية عبارة عن "قراءة ثم كتابة" عادية (get ثم update)،
    // يعني لو شخصين ضربوا نفس الكود في نفس اللحظة بالضبط، الاتنين ممكن يعدّوا فحص
    // "الكود متاح" قبل ما أي واحد يكتب، والكود يُستخدم مرتين. دلوقتي بنستخدم
    // transaction ذرّية زي حجز اسم المستخدم بالظبط: فايربيس بيضمن إن التعديل
    // يحصل مرة واحدة بس على أحدث نسخة من البيانات، وأي محاولة تانية في نفس
    // اللحظة هتتلغى (تترجع undefined) تلقائيًا.
    // عيب جديد (مُصلَح): لو المتصفح مفتحش الكود ده قبل كده، فايربيس بينادي هنا
    // أول مرة بقيمة null (مفيش نسخة محفوظة محليًا) قبل ما يجيب القيمة الحقيقية
    // من السيرفر. كان الكود القديم بيقفل ويلغي المعاملة نهائيًا فور ما يشوف null
    // (return بدون قيمة = إلغاء نهائي)، وده بيمنع فايربيس من الرجوع بالقيمة
    // الحقيقية والمحاولة تاني — فأي كود صحيح فعليًا كان بيترفض بغلط من أول مرة
    // يُقرأ فيها. دلوقتي بنرجّع null (مش undefined) في الحالة دي، وده بيخلي
    // فايربيس يقارنها بالسيرفر ويعيد نداء الدالة تلقائيًا بالقيمة الحقيقية.
    const txResult = await db.ref('codes/'+code).transaction(cur=>{
      if(cur===null) return null; // نسيب فايربيس يتأكد من السيرفر ويعيد المحاولة بدل الإلغاء الفوري
      if(cur.status!=='active' || cur.deviceId) return; // مستخدم أو غير صالح — نلغي المعاملة عن قصد
      if(cur.type !== myRole) return; // نوع غير مطابق لدور المستخدم — نلغي المعاملة عن قصد
      return {
        ...cur,
        deviceId: dId,
        assignedUid: myUid,
        deviceInfo: (navigator.userAgent||'').slice(0,150),
        redeemedAt: firebase.database.ServerValue.TIMESTAMP
      };
    });

    const finalCodeData = txResult.committed ? txResult.snapshot.val() : null;
    if(!finalCodeData || finalCodeData.assignedUid !== myUid){
      // مش احنا اللي فزنا بالمعاملة (أو الكود مش موجود أصلاً) — نجيب سبب واضح ودقيق
      // بدل رسالة عامة، عشان يبان فورًا هل السبب: كود غير موجود / نوع غير مطابق /
      // مربوط بجهاز فعلاً / متعطّل من الأدمن / منتهي الصلاحية
      const snap = await db.ref('codes/'+code).get();
      if(!snap.exists()){ toast('الكود غير موجود — تأكد إنك كتبته صح'); }
      else {
        const v = snap.val();
        if(v.type !== myRole){ toast('هذا الكود مخصص لـ '+(v.type==='teacher'?'المعلمات':'الطلاب')+'، مش لدورك الحالي'); }
        else if(v.deviceId){ toast('هذا الكود مستخدم بالفعل على جهاز آخر'); }
        else if(v.status==='disabled'){ toast('هذا الكود معطّل من الإدارة'); }
        else if(v.status==='expired'){ toast('هذا الكود منتهي الصلاحية'); }
        else { toast('تعذر التفعيل بسبب تعارض مؤقت، جرّب تاني'); }
        logSecurityAlert('code_reuse_attempt', code);
      }
      return;
    }

    const isTrial = finalCodeData.plan==='trial';
    const subUpdate = isTrial
      ? { codeId: code, type: 'trial', status:'trial', expiresAt: Date.now() + 3*24*60*60*1000 }
      : { codeId: code, type: finalCodeData.plan||finalCodeData.type, status:'active', expiresAt: finalCodeData.expiresAt||null };
    // كتابة واحدة ذرّية (multi-path update) بدل كتابتين منفصلتين (subscription ثم status):
    // لو الكتابة الأولى نجحت والتانية فشلت (مثلاً بسبب صلاحيات/قواعد Firebase)، كان الحساب
    // يفضل معلّق (status لسه pending) رغم إن الكود اتحجز واتحرق، فالمستخدم يحتاج كود تاني
    // من غير ما يبين له سبب واضح. دلوقتي الاتنين بيتكتبوا مع بعض أو محدش منهم يتكتب.
    await db.ref().update({
      ['users/'+myUid+'/subscription']: subUpdate,
      ['users/'+myUid+'/status']: 'active'
    });
    toast('تم تفعيل حسابك بنجاح 🎉');
  }catch(e){
    console.error('redeemCode failed:', e);
    // مدة أطول للرسالة عشان لو السبب صلاحيات (Permission Denied) في Firebase Rules
    // يبان واضح ومتختفيش بسرعة، بدل ما يظهر إحساس إن "مفيش حاجة حصلت"
    toast('تعذر التفعيل: ' + (e.message||'حاول مرة أخرى أو تواصل مع الأدمن'), 5000);
  } finally { if(btn){btn.disabled=false; btn.textContent='تفعيل الحساب';} }
}

let profileRef = null;

// عيب #1-4 (مُصلَح): كل المتغيرات الـ Global دي كانت بتفضل عالقة بعد تسجيل
// الخروج، فلو حساب تاني سجّل دخول في نفس المتصفح كان ممكن يشوف بيانات
// الحساب اللي قبله (شات، طالب/ة نشطة، معلم مخصص، تاب مفتوح...). الدالة دي
// بترجع كل حاجة لوضعها الافتراضي في كل مرة يتم فيها تسجيل خروج.
function resetLocalState(){
  state.chatWith = null;
  clearChatWith(); // مسح أي شات محفوظ في localStorage عند تسجيل الخروج (زي باقي حالات النافيجيشن تحت)
  navStack = []; // تصفير طبقات الرجوع (شات/مودال/صورة) المرتبطة بالحساب اللي خرج
  state.currentChatWith = null;
  state.currentCallId = null;
  if(state.callTimerInt){ clearInterval(state.callTimerInt); }
  state.callTimerInt = null;
  state.callSeconds = 0;
  teardownRtcListeners();
  closePeerConnection();

// عيب #9 (مُصلَح): مفيش أي كود كان بيتحقق من expiresAt للاشتراك التجريبي،
// يعني حساب "تجربة 3 أيام" كان فعليًا مش بينتهي أبدًا. الدالة دي بتفحص
// وقت انتهاء التجربة وترجع true/false.
function isTrialExpired(p){
  return !!(p && p.subscription && p.subscription.status==='trial' && p.subscription.expiresAt && Date.now() > p.subscription.expiresAt);
}
async function expireTrialIfNeeded(uid, p){
  if(isTrialExpired(p) && p.status!=='expired'){
    try{
      await db.ref('users/'+uid).update({status:'expired', 'subscription/status':'expired'});
    }catch(e){ /* لو فشل التحديث هيتحاول تاني في المرة الجاية */ }
  }
}
// فحص دوري كل دقيقة وهو التطبيق مفتوح، عشان التجربة تنتهي فورًا فور
// انتهاء المدة الزمنية حتى لو مفيش تعديل جديد في قاعدة البيانات يستدعي
// المستمع (onAuthStateChanged/profileRef بيتفعّلوا فقط عند تغيّر الداتا،
// مش عند مرور الوقت).
let trialCheckInterval = null;
function startTrialWatch(){
  stopTrialWatch();
  trialCheckInterval = setInterval(()=>{
    if(state.user && state.profile) expireTrialIfNeeded(state.user.uid, state.profile);
  }, 60000);
}
function stopTrialWatch(){ if(trialCheckInterval){ clearInterval(trialCheckInterval); trialCheckInterval=null; } }

function routeFromProfile(uid, p, isAdminNode){
  if(isAdminNode){ return 'ready'; }
  if(!p) return 'auth';
  if(p.role==='admin') return 'ready';
  if(p.status==='banned') return 'banned';
  if(isTrialExpired(p)){ expireTrialIfNeeded(uid, p); return 'expired'; }
  if(p.status==='expired') return 'expired';
  if(p.status!=='active') return 'pending';
  return 'ready';
}

auth.onAuthStateChanged(user=>{
  if(profileRef){ profileRef.off(); profileRef=null; }
  teardownChat(); teardownCallListener(); teardownCallPeerWatch();
  if(!user){ state.user=null; state.profile=null; state.route='auth'; resetLocalState(); state._chatRestoreDone=false; render(); return; }
  state.user = user;
  state.sessionStartedAt = Date.now(); // يُستخدم للتحقق من أوامر "إجبار تسجيل الخروج" الصادرة من الأدمن بعد هذه اللحظة
  // فحص إضافي: عقدة admins/{uid}:true منفصلة عن users/ — بعض المشاريع بتستخدمها بدل role:"admin"
  db.ref('admins/'+user.uid).get().then(adminSnap=>{
    const isAdminNode = adminSnap.exists() && adminSnap.val()===true;
    profileRef = db.ref('users/'+user.uid);
    profileRef.on('value', snap=>{
      const p = snap.val();
      if(p && p.forceLogoutAt && p.forceLogoutAt > state.sessionStartedAt){ auth.signOut(); return; }
      state.profile = isAdminNode ? {...(p||{}), role:'admin'} : p;
      state.route = routeFromProfile(user.uid, state.profile, isAdminNode);
      if(state.route==='ready'){ setupPresence(); startTrialWatch(); restoreChatIfNeeded(); startNotifListeners(); if(!isAdminNode && p && p.role!=='admin') listenIncomingCalls(); }
      render();
    });
  }).catch(()=>{
    // لو مفيش صلاحية قراءة admins/ أصلاً، كمّل بالمسار العادي
    profileRef = db.ref('users/'+user.uid);
    profileRef.on('value', snap=>{
      const p = snap.val();
      if(p && p.forceLogoutAt && p.forceLogoutAt > state.sessionStartedAt){ auth.signOut(); return; }
      state.profile = p;
      state.route = routeFromProfile(user.uid, p, false);
      if(state.route==='ready'){ setupPresence(); startTrialWatch(); restoreChatIfNeeded(); startNotifListeners(); if(p && p.role!=='admin') listenIncomingCalls(); }
      render();
    });
  });
});
// استرجاع الشات المحفوظ (لو موجود) مرة واحدة بس لكل جلسة/تسجيل دخول، عشان لو
// المستخدم قفل الشات بنفسه بعد الاسترجاع، ميرجعش له تاني مع أي تحديث تاني للبروفايل.
function restoreChatIfNeeded(){
  if(state.chatWith || state._chatRestoreDone) return;
  if(!state.profile || (state.profile.role!=='teacher' && state.profile.role!=='student')) return;
  state._chatRestoreDone = true;
  const saved = loadChatWith(state.user.uid);
  if(saved){ state.chatWith = saved; pushNav('chat'); }
}
function setupPresence(){
  if(state.presenceRef) return;
  const r = db.ref('presence/'+state.user.uid);
  state.presenceRef = r;
  r.onDisconnect().set({online:false, lastSeen: firebase.database.ServerValue.TIMESTAMP});
  r.set({online:true, lastSeen: firebase.database.ServerValue.TIMESTAMP});
}

/* =====[ SECTION: نظام الإشعارات (NOTIFICATIONS) ]=====
   نوعين من الإشعارات:
   1) إشعارات شخصية (notifications/{uid}/...) — بتتبعت لحد معيّن، زي "رسالة
      جديدة من فلان" أو رسالة مباشرة من الأدمن لمستخدم بعينه.
   2) إشعارات عامة (broadcastNotifications/...) — الأدمن يقدر يبعتها لكل
      المستخدمين أو لفئة معيّنة (معلمات فقط / طلاب فقط)، وكل مستخدم بيتابع
      آخر وقت شافها فيه (notifSeen/{uid}) عشان نحسب لو فيه جديد مالحقش يشوفه. */
let notifState = { items:{}, unread:0, broadcastItems:{}, lastSeenBroadcast:0 };
let notifPersonalRef=null, notifPersonalCb=null, notifBroadcastRef=null, notifBroadcastCb=null;
function startNotifListeners(){
  stopNotifListeners();
  if(!state.user) return;
  const uid = state.user.uid;
  notifPersonalRef = db.ref('notifications/'+uid).limitToLast(60);
  notifPersonalCb = notifPersonalRef.on('value', snap=>{
    notifState.items = snap.val() || {};
    recomputeUnread(); updateNotifBadgeUI();
  });
  notifBroadcastRef = db.ref('broadcastNotifications').limitToLast(30);
  notifBroadcastCb = notifBroadcastRef.on('value', snap=>{
    notifState.broadcastItems = snap.val() || {};
    recomputeUnread(); updateNotifBadgeUI();
  });
  db.ref('notifSeen/'+uid).get().then(s=>{ notifState.lastSeenBroadcast = s.val() || 0; recomputeUnread(); updateNotifBadgeUI(); }).catch(()=>{});
}
function stopNotifListeners(){
  if(notifPersonalRef && notifPersonalCb) notifPersonalRef.off('value', notifPersonalCb);
  if(notifBroadcastRef && notifBroadcastCb) notifBroadcastRef.off('value', notifBroadcastCb);
  notifPersonalRef=null; notifPersonalCb=null; notifBroadcastRef=null; notifBroadcastCb=null;
  notifState = { items:{}, unread:0, broadcastItems:{}, lastSeenBroadcast:0 };
  updateNotifBadgeUI();
}
function recomputeUnread(){
  const myRole = state.profile ? state.profile.role : null;
  let n = 0;
  Object.values(notifState.items||{}).forEach(it=>{ if(!it.read) n++; });
  Object.values(notifState.broadcastItems||{}).forEach(b=>{
    const target = b.target || 'all';
    if((target==='all' || target===myRole) && (b.ts||0) > (notifState.lastSeenBroadcast||0)) n++;
  });
  notifState.unread = n;
}
// بنحدّث شكل شارة العدد مباشرة على أي زرار جرس موجود في الصفحة حاليًا، من غير
// ما نعمل render() كامل (عشان مانكسرش أي شاشة مفتوحة زي الشات وقت وصول إشعار).
function updateNotifBadgeUI(){
  const n = notifState.unread;
  $all('.notif-badge').forEach(el=>{
    if(n>0){ el.textContent = n>9?'9+':String(n); el.style.display='flex'; }
    else { el.style.display='none'; }
  });
}

}

// لما المستخدم يفتح شات مع حد معيّن، أي إشعارات رسائل واردة من نفس الشخص
// بتتشال خالص (مش بس تتعلّم مقروءة) لأنه أصلاً بيبص على المحادثة دلوقتي ومحتاجهاش تفضل متخزنة.
function markChatNotificationsRead(otherUid){
  if(!state.user) return;
  db.ref('notifications/'+state.user.uid).orderByChild('fromUid').equalTo(otherUid).once('value').then(snap=>{
    const val = snap.val()||{};
    const updates = {};
    Object.entries(val).forEach(([id,n])=>{ if(n.type==='message') updates[id]=null; });
    if(Object.keys(updates).length) db.ref('notifications/'+state.user.uid).update(updates);
  }).catch(()=>{});

function notifItemHtml(n){

    return `<div class="list-item"><div class="avatar">📢</div><div class="li-body"><b>إشعار من الإدارة</b><span>${esc(n.text||'')}</span></div>

    <div class="li-meta"><span class="chip neutral">${fmtDate(n.ts)}</span></div></div>`;

function openNotifPanel(){
  const myRole = state.profile ? state.profile.role : null;
  const personal = Object.entries(notifState.items||{}).map(([id,n])=>({id, ...n, _kind:'personal'}));
  const broadcast = Object.entries(notifState.broadcastItems||{})
    .map(([id,n])=>({id, ...n, _kind:'broadcast'}))
    .filter(b=> (b.target||'all')==='all' || b.target===myRole);
  const merged = [...personal, ...broadcast].sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,60);
  showModal(`<h3>الإشعارات</h3><div id="notifPanelList">${merged.length ? merged.map(notifItemHtml).join('') : '<div class="empty-state">لا يوجد إشعارات حتى الآن</div>'}</div>`);
  $all('[data-notif-open]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const fromUid = el.dataset.notifFrom; if(!fromUid) return;
      hideModal();
      openChat(fromUid, el.dataset.notifFromName || 'مستخدم');
    });
  });
  // بمجرد ما المستخدم يفتح لوحة الإشعارات ويشوفها، الإشعارات الشخصية (رسالة أو
  // من الإدارة) بتتشال خالص من القاعدة — مفيش داعي تفضل متخزنة لحد ما حد يشوفها.
  const idsToDelete = {};
  personal.forEach(n=>{ idsToDelete[n.id]=null; });
  if(Object.keys(idsToDelete).length) db.ref('notifications/'+state.user.uid).update(idsToDelete).catch(()=>{});
  // وكمان بنسجّل إن المستخدم شاف الإشعارات العامة لحد دلوقتي
  const nowTs = Date.now();
  db.ref('notifSeen/'+state.user.uid).set(nowTs).catch(()=>{});
  notifState.lastSeenBroadcast = nowTs;
  notifState.items = {};
  recomputeUnread(); updateNotifBadgeUI();
}

// بترجع { snap } لو نجحت القراءة، أو { error: 'اسم المسار: رسالة الخطأ' } لو اترفضت —
// عشان لو حصل Permission Denied، نعرف بالظبط أي مسار هو من غير ما نحتاج نفتح Console
async function safeGet(path, ref){
  try{ return { snap: await ref.get() }; }
  catch(e){ return { error: path+': '+(e && e.message || e) }; }
}
async function loadAdminStats(){
  try{
  const results = await Promise.all([
    safeGet('users', db.ref('users')), safeGet('codes', db.ref('codes')),
    safeGet('security_alerts', db.ref('security_alerts').limitToLast(5)),
    safeGet('presence', db.ref('presence')), safeGet('progress', db.ref('progress')),
    safeGet('assignments', db.ref('assignments')), safeGet('calls', db.ref('calls')),
    safeGet('ratingsSummary', db.ref('ratingsSummary')), safeGet('finance', db.ref('finance'))
  ]);
  const failed = results.filter(r=>r.error).map(r=>r.error);
  if(failed.length){ throw new Error(failed.join(' | ')); }
  const [usersSnap, codesSnap, alertsSnap, presenceSnap, progressSnap, assignSnap, callsSnap, ratingsSnap, financeSnap] = results.map(r=>r.snap);
  const users = usersSnap.val()||{};
  const presence = presenceSnap.val()||{};
  const progress = progressSnap.val()||{};
  const assignments = assignSnap.val()||{};
  const calls = callsSnap.val()||{};
  const ratingsSummary = ratingsSnap.val()||{};
  const finance = financeSnap.val()||{};
  const totalOwed = Object.values(finance).reduce((s,f)=>s+(f.balance||0), 0);
  const userEntries = Object.entries(users);

  let teachers=0, students=0, admins=0, activeSubs=0, expiredSubs=0, onlineCount=0;
  userEntries.forEach(([uid,u])=>{
    if(u.role==='teacher') teachers++;
    else if(u.role==='student') students++;
    else if(u.role==='admin') admins++;
    if(u.status==='active') activeSubs++;
    if(u.status==='expired') expiredSubs++;
    if(presence[uid] && presence[uid].online) onlineCount++;
  });
  const codes = codesSnap.val()||{};
  const activeKeys = Object.values(codes).filter(c=>c.status==='active' && !c.deviceId).length;

  // عدد الرسائل الإجمالي — بنقرأ عداد خفيف (stats/totalMessages) بدل ما نجيب شجرة
  // chatThreads كاملة في كل مرة تُفتح فيها لوحة التحكم (ده كان بيكلّف قراءات Firebase
  // كتير أوي مع نمو عدد المحادثات). العداد بيتحدّث تلقائيًا مع كل رسالة جديدة (sendChatMessage/
  // uploadChatFile/forwardMessageTo)، ولو العداد لسه معمول (نشر أول مرة)، بنعمل الفحص
  // الكامل مرة واحدة بس ونهيّئ العداد بيها، وبعد كده كل تحميل للوحة هيبقى رخيص جدًا.
  let messagesCount = 0;
  try{
    const counterSnap = await db.ref('stats/totalMessages').get();
    if(counterSnap.exists()){
      messagesCount = counterSnap.val() || 0;
    } else {
      const chatsSnap = await db.ref('chatThreads').get();
      const chats = chatsSnap.val()||{};
      Object.values(chats).forEach(t=>{ messagesCount += Object.keys(t.messages||{}).length; });
      db.ref('stats/totalMessages').set(messagesCount); // تهيئة العداد مرة واحدة فقط
    }
  }catch(_){ /* لو مفيش صلاحية قراءة، نسيب العداد صفر بدل ما نكسر باقي اللوحة */ }

  $('#statsArea').innerHTML = `
    <div class="stat-box"><b>${onlineCount}</b><span>متصلين الآن</span></div>

    <div class="stat-box"><b>${activeSubs}</b><span>اشتراكات فعّالة</span></div>
    <div class="stat-box"><b>${messagesCount}</b><span>رسائل الشات</span></div>
    <div class="stat-box"><b>${Object.keys(calls).length}</b><span>مكالمات</span></div>
    <div class="stat-box"><b>${totalOwed.toLocaleString('ar-EG')}</b><span>إجمالي مستحقات المعلمات (ج.م)</span></div>`;

  // أحدث التسجيلات
  const recent = [...userEntries].sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0)).slice(0,5);
  $('#recentRegs').innerHTML = recent.length ? recent.map(([id,u])=>`
    <div class="list-item"><div class="avatar">${initials(u.name)}</div>
      <div class="li-body"><b>${esc(u.name)}</b><span>@${esc(u.username)} · ${u.role==='teacher'?'معلمة':u.role==='admin'?'أدمن':'طالب'}</span></div>

    </div>`).join('') : '<div class="empty-state">لا يوجد مستخدمين</div>';

  // أكثر الطلاب نشاطاً (حسب نسبة الإنجاز كمؤشر تقدّم/نشاط)
  const topStu = userEntries.filter(([,u])=>u.role==='student')
    .map(([id,u])=>({id,u,pct:(progress[id]&&progress[id].totalPercent)||0}))
    .sort((a,b)=>b.pct-a.pct).slice(0,5);
  $('#topStudents').innerHTML = topStu.length ? topStu.map(({id,u,pct})=>`
    <div class="list-item"><div class="avatar">${initials(u.name)}</div>
      <div class="li-body"><b>${esc(u.name)}</b><span>${progress[id]?.currentLevel||'لم يبدأ بعد'}</span>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="li-meta"><span style="font-size:11px">${pct}%</span></div>
    </div>`).join('') : '<div class="empty-state">لا يوجد طلاب بعد</div>';

  // أكثر المعلمات نشاطاً (حسب عدد الطلاب المخصصين كمؤشر حِمل العمل) + متوسط تقييمها
  const topTea = userEntries.filter(([,u])=>u.role==='teacher')
    .map(([id,u])=>({id,u,count:Object.keys(assignments[id]||{}).length, rs: ratingsSummary[id]||{}}))
    .sort((a,b)=>b.count-a.count).slice(0,5);
  $('#topTeachers').innerHTML = topTea.length ? topTea.map(({id,u,count,rs})=>`
    <div class="list-item"><div class="avatar">${initials(u.name)}</div>
      <div class="li-body"><b>${esc(u.name)}</b><span>${count} طالب مخصص · ${starsAvgHtml(rs.sum, rs.count)}</span></div>
      <div class="li-meta"><span class="chip ${presence[id]&&presence[id].online?'ok':'neutral'}">${presence[id]&&presence[id].online?'متصلة':'غير متصلة'}</span></div>
    </div>`).join('') : '<div class="empty-state">لا توجد معلمات بعد</div>';

  // صحة الاشتراكات: منتهية + قريبة الانتهاء (خلال 3 أيام)، بالاعتماد على subscription.expiresAt
  const soonMs = 3*24*60*60*1000;
  const nowTs = Date.now();
  const expiredList = userEntries.filter(([,u])=>u.status==='expired');
  const expiringSoon = userEntries.filter(([,u])=>{

  });
  $('#subsHealth').innerHTML = `

    ${expiringSoon.length ? expiringSoon.slice(0,5).map(([id,u])=>`
      <div class="list-item"><div class="avatar">${initials(u.name)}</div>
        <div class="li-body"><b>${esc(u.name)}</b><span>ينتهي ${fmtDate(u.subscription.expiresAt)}</span></div>
      </div>`).join('') : ''}`;

  const alerts = alertsSnap.val()||{};
  const arr = Object.entries(alerts).reverse();
  $('#alertsPreview').innerHTML = arr.length ? arr.map(([id,a])=>`

  db.ref('adminAuditLog').limitToLast(15).get().then(snap=>{
    const logs = Object.entries(snap.val()||{}).reverse();
    const labels = { generate_key:'🔑 توليد مفتاح', delete_keys:'🗑️ حذف مفاتيح', change_role:'🔄 تغيير دور', delete_user:'🗑️ حذف حساب', teacher_finance:'💰 تعديل رصيد معلمة' };
    $('#adminAuditPreview').innerHTML = logs.length ? logs.map(([id,l])=>`

  }catch(e){ showLoadError('statsArea', e); showLoadError('alertsPreview', e); }

function filterSortKeys(codes){
  let entries = Object.entries(codes);
  const s = keysState.search.trim().toLowerCase();
  if(s) entries = entries.filter(([id,c])=> id.toLowerCase().includes(s) || (c.ownerName||'').toLowerCase().includes(s));
  if(keysState.type!=='all') entries = entries.filter(([,c])=>c.type===keysState.type);
  if(keysState.status==='active') entries = entries.filter(([,c])=>c.status==='active');
  else if(keysState.status==='disabled') entries = entries.filter(([,c])=>c.status==='disabled');
  else if(keysState.status==='expired') entries = entries.filter(([,c])=>c.status==='expired');
  else if(keysState.status==='used') entries = entries.filter(([,c])=>!!c.deviceId);
  else if(keysState.status==='unused') entries = entries.filter(([,c])=>!c.deviceId);
  if(keysState.sort==='oldest') entries.sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  else if(keysState.sort==='expiry') entries.sort((a,b)=>(a[1].expiresAt||Infinity)-(b[1].expiresAt||Infinity));
  else entries.sort((a,b)=>(b[1].createdAt||0)-(a[1].createdAt||0));
  return entries;
}
